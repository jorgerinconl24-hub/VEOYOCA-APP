<script>
// ═══════════════════════════════════════════════════════════
// ONESIGNAL
// ═══════════════════════════════════════════════════════════
var OS_APP_ID  = 'f2baf005-ca28-4491-a772-eca363f6f142';
var OS_API_KEY = 'os_v2_app_6k5pabokfbcjdj3s5srwh5xrikmqkjompbiegtmvzstbmuwyrmmbg43dgpebq4qvxtathkixulolqpm7nyp66zmp43ds2wtv2sv5u4i';

function enviarPushOneSignal(titulo, cuerpo) {
  fetch('https://onesignal.com/api/v1/notifications', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Basic ' + OS_API_KEY
    },
    body: JSON.stringify({
      app_id: OS_APP_ID,
      included_segments: ['All'],
      headings: { es: titulo, en: titulo },
      contents: { es: cuerpo, en: cuerpo },
      url: 'https://jorgerinconl24-hub.github.io/VEOYOCA-APP/'
    })
  }).then(function(r){ return r.json(); })
    .then(function(d){ console.log('Push:', JSON.stringify(d)); })
    .catch(function(e){ console.log('Push err:', e); });
}

// ═══════════════════════════════════════════════════════════
// VARIABLES GLOBALES
// ═══════════════════════════════════════════════════════════
var DB={usuarios:[],pedidos:[],bitacora:[]};
var SESSION=null,TAB='home',PEDIDO_EDIT_ID=null,SAVING=false,_db=null;

function fecha(){return new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function hora(){return new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function cerrarModal(id){document.getElementById(id).classList.remove('open');}
function toast(msg,tipo){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(tipo==='ok'?' t-ok':tipo==='err'?' t-err':tipo==='warn'?' t-warn':'');setTimeout(function(){t.className='toast';},4000);}
function mostrarBadge(tipo){var b=document.getElementById('sync-badge');b.className='sync-badge show'+(tipo==='syncing'?' syncing':tipo==='err'?' err':'');b.textContent=tipo==='syncing'?'Guardando...':tipo==='err'?'Error al guardar':'Guardado';if(tipo!=='syncing')setTimeout(function(){b.className='sync-badge';},2500);}
function diasRestantes(f){if(!f)return null;var p=f.split('/');if(p.length!==3)return null;var d=parseInt(p[0]),m=parseInt(p[1])-1,y=parseInt(p[2]);if(y<100)y+=2000;var dt=new Date(y,m,d);dt.setHours(0,0,0,0);var hoy=new Date();hoy.setHours(0,0,0,0);return isNaN(dt.getTime())?null:Math.round((dt-hoy)/86400000);}
function clasif(p){if(p.estatus==='ENTREGADO')return 'done';var d=diasRestantes(p.fechaLimite);if(d===null)return 'sf';if(d<0)return 'vencido';if(d<=7)return 'urgente';return 'ok';}
function badgeHTML(p){var d=diasRestantes(p.fechaLimite);if(p.estatus==='LISTO')return '<span class="badge b-success">Listo</span>';if(p.estatus==='EN PROCESO')return '<span class="badge b-info">En proceso</span>';if(d===null)return '<span class="badge b-muted">Sin fecha</span>';if(d<0)return '<span class="badge b-danger">Vencido '+Math.abs(d)+'d</span>';if(d<=7)return '<span class="badge b-warning">En '+d+'d</span>';return '<span class="badge b-muted">En '+d+'d</span>';}
function fechaInput(f){if(!f)return '';var p=f.split('/');if(p.length!==3)return '';var y=p[2];if(y.length===2)y='20'+y;return y+'-'+('0'+p[1]).slice(-2)+'-'+('0'+p[0]).slice(-2);}
function inputFecha(f){if(!f)return '';var p=f.split('-');if(p.length!==3)return '';return p[2]+'/'+p[1]+'/'+p[0];}
function registrarBitacora(id,accion){DB.bitacora.push({pedidoId:id,accion:accion,usuario:SESSION.nombre,fecha:fecha(),hora:hora()});if(DB.bitacora.length>500)DB.bitacora=DB.bitacora.slice(-500);}

async function guardarDB(){
  if(SAVING||!_db)return;SAVING=true;mostrarBadge('syncing');
  try{var {setDoc,doc}=window._firestore;await setDoc(doc(_db,'veoyoca','data'),{usuarios:DB.usuarios,pedidos:DB.pedidos,bitacora:DB.bitacora.slice(-500),updatedAt:Date.now()});mostrarBadge('ok');}
  catch(e){mostrarBadge('err');toast('Error: '+e.message,'err');}SAVING=false;
}

function login(){
  var u=document.getElementById('l-user').value.trim().toLowerCase();
  var p=document.getElementById('l-pass').value;
  var usuario=DB.usuarios.find(function(x){return x.username.toLowerCase()===u&&x.password===p;});
  if(!usuario){document.getElementById('l-err').style.display='block';return;}
  SESSION=usuario;localStorage.setItem('veo_session',JSON.stringify({id:usuario.id}));mostrarApp();
}
function logout(){SESSION=null;localStorage.removeItem('veo_session');location.reload();}
function mostrarApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-avatar').textContent=SESSION.nombre.substring(0,2).toUpperCase();

function goTab(tab,btn){
  TAB=tab;document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});if(btn)btn.classList.add('on');
  var titulos={home:'Pedidos',entregar:'Despacho',nuevo:'Nuevo pedido',reportes:'Reportes',admin:'Administracion',plan:'Rutas',ia:'Plan IA',notif:'Alertas y Notificaciones'};
  document.getElementById('topbar-sub').textContent=titulos[tab]||SESSION.nombre;
  var c=document.getElementById('content');
  c.onclick=function(e){var ed=e.target.getAttribute('data-edit');var en=e.target.getAttribute('data-entregar');if(ed)abrirEditar(ed);if(en)marcarEntregado(en);};
  if(tab==='home')renderHome(c);else if(tab==='entregar')renderEntregar(c);else if(tab==='nuevo')renderNuevo(c);
  else if(tab==='reportes')renderReportes(c);else if(tab==='admin')renderAdmin(c);
  else if(tab==='plan')renderPlanificacion(c);else if(tab==='ia')renderPlanIA(c);else if(tab==='notif')renderNotificaciones(c);
}

function renderHome(c){
  var pends=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';});
  var venc=pends.filter(function(p){return clasif(p)==='vencido';}).length;
  var urg=pends.filter(function(p){return clasif(p)==='urgente';}).length;
  var ent=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO';}).length;
  var total=DB.pedidos.length;var pct=total?Math.round((ent/total)*100):0;
  c.innerHTML='<div class="stats-bar"><div class="stat" onclick="aplicarFiltro(\'\')" style="cursor:pointer"><div class="stat-v">'+pends.length+'</div><div class="stat-l">pendientes</div></div><div class="stat" onclick="aplicarFiltro(\'vencido\')" style="cursor:pointer"><div class="stat-v" style="color:#fca5a5">'+venc+'</div><div class="stat-l">vencidos</div></div><div class="stat" onclick="aplicarFiltro(\'urgente\')" style="cursor:pointer"><div class="stat-v" style="color:#fcd34d">'+urg+'</div><div class="stat-l">urgentes</div></div><div class="stat" onclick="aplicarFiltroEntregados()" style="cursor:pointer"><div class="stat-v" style="color:#86efac">'+ent+'</div><div class="stat-l">entregados</div></div></div><div class="prog-wrap"><div class="prog-bar"><div class="prog-fill" style="width:'+pct+'%"></div></div><div class="prog-label">'+ent+' de '+total+' entregados ('+pct+'%)</div></div><div class="toolbar"><input type="text" id="h-buscar" placeholder="Buscar cliente o numero..." oninput="filtrarHome()"><select id="h-est" onchange="filtrarHome()"><option value="">Todos</option><option value="vencido">Vencidos</option><option value="urgente">Urgentes</option><option value="sf">Sin fecha</option><option value="ok">Con tiempo</option><option value="LISTO">Listos</option></select></div><div class="section-pad" id="home-lista"></div>';
  filtrarHome();
}
function aplicarFiltro(valor){
  var sel=document.getElementById('h-est');
  if(sel){sel.value=valor;filtrarHome();}
}
function aplicarFiltroEntregados(){
  var el=document.getElementById('home-lista');if(!el)return;
  var lista=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO';});
  lista.sort(function(a,b){return (b.fechaEntrega||'').localeCompare(a.fechaEntrega||'');});
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">📦</div>No hay pedidos entregados</div>';return;}
  var h='<div class="sec-label">Entregados ('+lista.length+')</div>';
  lista.forEach(function(p){
    var num=p.numero||p.id.substring(0,6);
    h+='<div class="card"><div class="card-head"><div class="card-num">#'+num+'</div><div class="card-body"><div class="card-cliente">'+(p.cliente||'Sin nombre')+'</div><div class="card-meta">'+(p.ciudad||'')+(p.vendedor?' - '+p.vendedor:'')+'</div><div class="card-desc">'+(p.descripcion||'')+'</div></div><span class="badge b-success">Entregado</span></div>';
    h+='<div class="card-foot"><span style="font-size:11px;color:var(--muted)">'+( p.fechaEntrega||'')+(p.entregadoPor?' por '+p.entregadoPor:'')+'</span></div></div>';
  });
  el.innerHTML=h;
  var sel=document.getElementById('h-est');if(sel)sel.value='';
}

  var b=(document.getElementById('h-buscar')||{value:''}).value.toLowerCase();
  var fe=(document.getElementById('h-est')||{value:''}).value;
  var lista=DB.pedidos.filter(function(p){if(p.estatus==='ENTREGADO')return false;var mb=!b||((p.cliente||'').toLowerCase().indexOf(b)>=0||(p.numero||'').indexOf(b)>=0);var mfe=!fe||clasif(p)===fe||(fe==='LISTO'&&p.estatus==='LISTO');return mb&&mfe;});
  lista.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});
  var el=document.getElementById('home-lista');if(!el)return;
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">OK</div>No hay pedidos pendientes</div>';return;}
  var g={vencido:[],urgente:[],sf:[],ok:[],LISTO:[]};
  lista.forEach(function(p){var cc=p.estatus==='LISTO'?'LISTO':clasif(p);if(g[cc])g[cc].push(p);else g.ok.push(p);});
  var etq={vencido:'Vencidos',urgente:'Urgentes',sf:'Sin fecha',ok:'Con tiempo',LISTO:'Listos para entregar'};
  var h='';['vencido','urgente','LISTO','sf','ok'].forEach(function(t){if(!g[t]||!g[t].length)return;h+='<div class="sec-label">'+etq[t]+' ('+g[t].length+')</div>';g[t].forEach(function(p){h+=cardHTML(p,false);});});
  el.innerHTML=h;
}
function cardHTML(p,conEntregar){
  var canEdit=SESSION.rol==='admin'||SESSION.username===p.creadoPor||SESSION.username===p.vendedor;
  var pid=p.id;var num=p.numero||pid.substring(0,6);
  var h='<div class="card" id="card-'+pid+'"><div class="card-head"><div class="card-num">#'+num+'</div><div class="card-body"><div class="card-cliente">'+(p.cliente||'Sin nombre')+'</div><div class="card-meta">'+(p.ciudad||'sin ciudad')+(p.vendedor?' - '+p.vendedor:'')+'</div>';
  if(p.proveedor)h+='<span class="card-vend" style="background:#fef3c7;color:#92400e">'+p.proveedor+(p.ordenCompra?' OC:'+p.ordenCompra:'')+'</span>';
  h+='<div class="card-desc">'+(p.descripcion||'')+'</div></div>'+badgeHTML(p)+'</div><div class="card-foot">';
  if(canEdit)h+='<button class="btn btn-ghost btn-sm" data-edit="'+pid+'">Editar</button>';
  if(conEntregar&&p.estatus!=='ENTREGADO'){h+='<input type="text" id="nota-'+pid+'" placeholder="Nota de entrega..."><button class="btn btn-green btn-sm" data-entregar="'+pid+'">Entregar</button>';}
  h+='</div></div>';return h;
}

function renderEntregar(c){
  var listos=DB.pedidos.filter(function(p){return p.estatus==='LISTO';});
  var urgentes=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='urgente';});
  var vencidos=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='vencido';});
  var html='<div class="section-pad">';
  if(!listos.length&&!urgentes.length&&!vencidos.length){html+='<div class="empty"><div class="empty-icon">OK</div>No hay pedidos urgentes ni listos</div>';}
  else{if(listos.length){html+='<div class="sec-label">Listos ('+listos.length+')</div>';listos.forEach(function(p){html+=cardHTML(p,true);});}
  var un=urgentes.filter(function(p){return p.estatus!=='LISTO';});if(un.length){html+='<div class="sec-label">Urgentes</div>';un.forEach(function(p){html+=cardHTML(p,true);});}
  var vn=vencidos.filter(function(p){return p.estatus!=='LISTO'&&clasif(p)!=='urgente';});if(vn.length){html+='<div class="sec-label">Vencidos</div>';vn.forEach(function(p){html+=cardHTML(p,true);});}}
  c.innerHTML=html+'</div>';
}
async function marcarEntregado(id){
  var p=DB.pedidos.find(function(x){return x.id===id;});if(!p)return;
  var nota=(document.getElementById('nota-'+id)||{}).value||'';
  p.estatus='ENTREGADO';p.fechaEntrega=fecha();p.notaEntrega=nota;p.entregadoPor=SESSION.nombre;
  registrarBitacora(id,'ENTREGADO. Nota: '+nota);await guardarDB();
  var card=document.getElementById('card-'+id);
  if(card){card.style.opacity='.4';card.querySelector('.card-foot').innerHTML='<span style="color:var(--success);font-size:13px;font-weight:600">Entregado hoy</span>';}
  toast('Pedido entregado','ok');
  enviarPushOneSignal('✅ Pedido entregado #'+(p.numero||''),'Cliente: '+(p.cliente||'')+(nota?' — '+nota:''));
}

}
async function crearPedido(){
  var cliente=document.getElementById('n-cliente').value.trim();
  var desc=document.getElementById('n-desc').value.trim();
  if(!cliente||!desc){toast('Cliente y descripcion son obligatorios','err');return;}
  var num=document.getElementById('n-numero').value.trim();
  var maxN=0;DB.pedidos.forEach(function(p){var n=parseInt(p.numero||0);if(n>maxN)maxN=n;});
  var numero=num||String(maxN+1);
  var p={id:uid(),numero:numero,cliente:cliente,ciudad:document.getElementById('n-ciudad').value,vendedor:document.getElementById('n-vendedor').value,proveedor:document.getElementById('n-proveedor').value.trim(),ordenCompra:document.getElementById('n-oc').value.trim(),fechaLimite:inputFecha(document.getElementById('n-fecha').value),estatus:document.getElementById('n-estado').value||'PENDIENTE',descripcion:desc,creadoPor:SESSION.username,creadoPorNombre:SESSION.nombre,fechaCreacion:fecha(),horaCreacion:hora()};
  DB.pedidos.push(p);registrarBitacora(p.id,'CREADO por '+SESSION.nombre);
  await guardarDB();
  ['n-numero','n-cliente','n-ciudad','n-proveedor','n-oc','n-fecha','n-desc'].forEach(function(id){document.getElementById(id).value='';});
  toast('Pedido #'+numero+' creado','ok');
  enviarPushOneSignal('📦 Nuevo pedido #'+numero,'Cliente: '+cliente+' — '+desc.substring(0,60));
}

function abrirEditar(id){
  var p=DB.pedidos.find(function(x){return x.id===id;});if(!p)return;
  PEDIDO_EDIT_ID=id;
  document.getElementById('modal-titulo').textContent='Editar #'+(p.numero||id.substring(0,6));
  document.getElementById('e-id').value=id;document.getElementById('e-cliente').value=p.cliente||'';document.getElementById('e-ciudad').value=p.ciudad||'';
  document.getElementById('e-fecha').value=fechaInput(p.fechaLimite);document.getElementById('e-desc').value=p.descripcion||'';
  document.getElementById('e-proveedor').value=p.proveedor||'';document.getElementById('e-oc').value=p.ordenCompra||'';document.getElementById('e-nota').value='';
  var vsel=document.getElementById('e-vendedor');vsel.innerHTML='<option value="">Sin cambio</option>';
  DB.usuarios.forEach(function(u){var o=document.createElement('option');o.value=u.nombre;o.textContent=u.nombre;if(u.nombre===p.vendedor)o.selected=true;vsel.appendChild(o);});
  document.getElementById('e-estado').value=p.estatus||'';
  document.getElementById('modal-edit').classList.add('open');
}
async function guardarEdicion(){
  var id=PEDIDO_EDIT_ID;var p=DB.pedidos.find(function(x){return x.id===id;});if(!p)return;
  var cambios=[];
  var vals={cliente:document.getElementById('e-cliente').value.trim(),ciudad:document.getElementById('e-ciudad').value.trim(),vendedor:document.getElementById('e-vendedor').value,fechaLimite:inputFecha(document.getElementById('e-fecha').value),estatus:document.getElementById('e-estado').value,descripcion:document.getElementById('e-desc').value.trim(),proveedor:document.getElementById('e-proveedor').value.trim(),ordenCompra:document.getElementById('e-oc').value.trim()};
  var nota=document.getElementById('e-nota').value.trim();
  for(var k in vals){if(vals[k]&&vals[k]!==p[k]){cambios.push(k);p[k]=vals[k];}}
  if(nota){cambios.push('nota');p.nota=nota;}
  if(!cambios.length){cerrarModal('modal-edit');toast('Sin cambios','warn');return;}
  p.ultimaEdicion=fecha()+' '+hora();p.editadoPor=SESSION.nombre;
  registrarBitacora(id,'EDICION ('+cambios.join(', ')+') por '+SESSION.nombre);
  await guardarDB();cerrarModal('modal-edit');goTab(TAB,document.getElementById('nb-'+TAB));toast('Pedido actualizado','ok');
}

function renderReportes(c){
  var total=DB.pedidos.length,ent=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO';}).length;
  var pend=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';}).length;
  var venc=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='vencido';}).length;
  var listos=DB.pedidos.filter(function(p){return p.estatus==='LISTO';}).length;
  var entHoy=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO'&&p.fechaEntrega===fecha();}).length;
  var pct=total?Math.round((ent/total)*100):0;
  var pv={};DB.pedidos.forEach(function(p){var v=p.vendedor||'Sin vendedor';if(!pv[v])pv[v]={t:0,e:0};pv[v].t++;if(p.estatus==='ENTREGADO')pv[v].e++;});
  var va=[];for(var v in pv)va.push({v:v,t:pv[v].t,e:pv[v].e});va.sort(function(a,b){return b.t-a.t;});
  var maxT=va.length?va[0].t:1;var bit=DB.bitacora.slice(-10).reverse();
  var html='<div class="report-grid"><div class="report-card"><div class="report-val" style="color:var(--accent)">'+total+'</div><div class="report-label">Total</div></div><div class="report-card"><div class="report-val" style="color:var(--success)">'+ent+'</div><div class="report-label">Entregados</div></div><div class="report-card"><div class="report-val" style="color:var(--warning)">'+pend+'</div><div class="report-label">Pendientes</div></div><div class="report-card"><div class="report-val" style="color:var(--danger)">'+venc+'</div><div class="report-label">Vencidos</div></div><div class="report-card"><div class="report-val" style="color:var(--info)">'+listos+'</div><div class="report-label">Listos</div></div><div class="report-card"><div class="report-val" style="color:var(--success)">'+entHoy+'</div><div class="report-label">Entregados hoy</div></div><div class="report-card"><div class="report-val">'+pct+'%</div><div class="report-label">Completados</div></div><div class="report-card"><div class="report-val">'+DB.bitacora.length+'</div><div class="report-label">Acciones</div></div></div>';
  if(va.length){html+='<div class="chart-wrap"><div class="chart-title">Por vendedor</div>';va.slice(0,8).forEach(function(item){html+='<div class="bar-row"><div class="bar-label">'+item.v.split(' ')[0]+'</div><div class="bar-track"><div class="bar-fill" style="width:'+Math.round((item.t/maxT)*100)+'%;background:var(--accent)"></div></div><div class="bar-val">'+item.t+'</div></div>';});html+='</div>';}
  if(bit.length){html+='<div class="chart-wrap"><div class="chart-title">Actividad reciente</div>';bit.forEach(function(b){html+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><div style="font-weight:600">'+(b.accion||'').substring(0,60)+'</div><div style="color:var(--muted)">'+b.fecha+' '+b.hora+'</div></div>';});html+='</div>';}
  c.innerHTML=html;
}

function renderAdmin(c){
  if(SESSION.rol!=='admin'){c.innerHTML='<div class="empty">Acceso denegado</div>';return;}

function activarPush(){
  if(!('Notification' in window)){toast('Este navegador no soporta notificaciones','err');return;}
  var perm = Notification.permission;
  if(perm === 'granted'){
    toast('Notificaciones ya están activadas ✓','ok');
    var btn=document.getElementById('btn-activar-push');
    if(btn){btn.textContent='✓ Activado';btn.style.background='#6b7280';}
    return;
  }
  if(perm === 'denied'){
    toast('Permiso denegado — actívalo en Ajustes → VeoYoca → Notificaciones','err');
    return;
  }
  if(!window._OneSignal){toast('OneSignal cargando, espera...','warn');setTimeout(activarPush,1500);return;}
  window._OneSignal.Notifications.requestPermission().then(function(accepted){
    if(accepted){toast('Push activado ✓','ok');var btn=document.getElementById('btn-activar-push');if(btn){btn.textContent='✓ Activado';btn.style.background='#6b7280';}}
    else{toast('Permiso denegado','err');}
  }).catch(function(){
    window._OneSignal.Slidedown.promptPush();
  });
}

function guardarConfigEmail(){var cfg=getNotifConfig();cfg.emailDestino=(document.getElementById('cfg-email-destino')||{value:''}).value.trim();cfg.emailjsServiceId=(document.getElementById('cfg-emailjs-sid')||{value:''}).value.trim();cfg.emailjsTemplateId=(document.getElementById('cfg-emailjs-tid')||{value:''}).value.trim();cfg.emailjsPublicKey=(document.getElementById('cfg-emailjs-key')||{value:''}).value.trim();if(!cfg.emailDestino||!cfg.emailjsServiceId||!cfg.emailjsTemplateId||!cfg.emailjsPublicKey){toast('Completa todos los campos','err');return;}cfg.emailActivo=true;setNotifConfig(cfg);toast('Correo guardado ✓','ok');renderNotificaciones(document.getElementById('content'));}
function guardarConfigWA(){var cfg=getNotifConfig();cfg.waNumero=(document.getElementById('cfg-wa-numero')||{value:''}).value.trim().replace(/\s/g,'');cfg.waApikey=(document.getElementById('cfg-wa-apikey')||{value:''}).value.trim();if(!cfg.waNumero||!cfg.waApikey){toast('Completa número y apikey','err');return;}cfg.waActivo=true;setNotifConfig(cfg);toast('WhatsApp guardado ✓','ok');renderNotificaciones(document.getElementById('content'));}
