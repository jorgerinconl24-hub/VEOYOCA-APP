<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>VeoYoca — Sistema de Pedidos</title>
<style>
:root{
  --accent:#1a1a2e;--accent2:#2d2d5e;--success:#16a34a;--danger:#dc2626;
  --warning:#d97706;--info:#1d4ed8;--bg:#f4f4f8;--card:#fff;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;
  --sbg:#f0fdf4;--dbg:#fef2f2;--wbg:#fffbeb;--ibg:#eff6ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}

/* ── SPLASH ── */
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent)}
.splash-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px}
.splash-title{color:#fff;font-size:22px;font-weight:700}
.splash-sub{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
.splash-spinner{margin-top:32px;width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── LOGIN ── */
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--accent)}
.login-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px}
.login-title{color:#fff;font-size:24px;font-weight:600;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px}
.login-card h2{font-size:16px;font-weight:600;margin-bottom:20px;color:var(--text)}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.field input,.field select{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;transition:border-color .2s}
.field input:focus,.field select:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;margin-top:4px}
.btn-primary:disabled{opacity:.5}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none}

/* ── SHELL ── */
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-left{display:flex;align-items:center;gap:10px}
.topbar h1{font-size:16px;font-weight:600}
.topbar p{font-size:11px;opacity:.6;margin-top:1px}
.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
.navbar{background:var(--accent);display:flex;border-top:1px solid rgba(255,255,255,.1);position:sticky;bottom:0;z-index:50}
.nav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;transition:color .2s}
.nav-btn.on{color:#fff}
.nav-icon{font-size:22px;line-height:1}
.content{flex:1;overflow-y:auto;padding-bottom:8px}

/* ── SYNC BADGE ── */
.sync-badge{position:fixed;top:56px;right:12px;background:var(--success);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-badge.show{opacity:1}
.sync-badge.syncing{background:var(--info)}
.sync-badge.err{background:var(--danger)}

/* ── STATS BAR ── */
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--accent2)}
.stat{text-align:center;padding:10px 4px;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border:none}
.stat-v{font-size:20px;font-weight:600;color:#fff}
.stat-l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.prog-wrap{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border)}
.prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s}
.prog-label{font-size:11px;color:var(--muted)}

/* ── CARDS ── */
.section-pad{padding:12px 14px}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.card-num{font-size:12px;font-weight:600;color:var(--muted);min-width:42px}
.card-body{flex:1;min-width:0}
.card-cliente{font-size:15px;font-weight:600}
.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.card-desc{font-size:12px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-vend{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:#e8f0fe;color:#1a1a2e;margin-top:4px;font-weight:600}
.card-foot{border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-foot input{flex:1;min-width:100px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.card.done{opacity:.45}

/* ── BADGES ── */
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0}
.b-danger{background:var(--dbg);color:var(--danger)}
.b-warning{background:var(--wbg);color:var(--warning)}
.b-success{background:var(--sbg);color:var(--success)}
.b-info{background:var(--ibg);color:var(--info)}
.b-muted{background:#f3f4f6;color:var(--muted)}

/* ── BUTTONS ── */
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-dark{background:var(--accent);color:#fff}
.btn-green{background:var(--success);color:#fff}
.btn-blue{background:var(--info);color:#fff}
.btn-red{background:var(--danger);color:#fff}
.btn-ghost{background:#f3f4f6;color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}

/* ── TOOLBAR ── */
.toolbar{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.toolbar input{flex:1;min-width:140px}

/* ── MODAL ── */
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.sheet-handle{width:36px;height:4px;background:#e5e7eb;border-radius:99px;margin:12px auto 0}
.sheet-head{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sheet-head h2{font-size:16px;font-weight:600}
.sheet-close{background:none;border:none;font-size:22px;color:var(--muted);padding:0 4px;line-height:1}
.sheet-body{padding:16px 18px}
.sfield{margin-bottom:14px}
.sfield label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sfield input,.sfield select,.sfield textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:#fff}
.sfield input:focus,.sfield select:focus,.sfield textarea:focus{outline:none;border-color:var(--accent)}
.sfield textarea{resize:vertical;min-height:80px}
.sfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}

/* ── REPORTES ── */
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px}
.report-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.report-val{font-size:28px;font-weight:700;margin-bottom:4px}
.report-label{font-size:12px;color:var(--muted)}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;padding:14px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px;color:var(--text)}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--muted);min-width:80px;text-align:right}
.bar-track{flex:1;height:18px;background:#f3f4f6;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.bar-val{font-size:12px;font-weight:600;min-width:28px}

/* ── ADMIN ── */
.admin-section{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;overflow:hidden}
.admin-row{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.admin-row:last-child{border:none}
.admin-info{flex:1;min-width:0}
.admin-name{font-size:14px;font-weight:600}
.admin-meta{font-size:12px;color:var(--muted);margin-top:1px}
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.role-admin{background:#fef3c7;color:#92400e}
.role-emp{background:#e0e7ff;color:#3730a3}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center;font-weight:500}
.toast.show{opacity:1}
.toast.t-ok{background:var(--success)}
.toast.t-err{background:var(--danger)}
.toast.t-warn{background:var(--warning)}

.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
@keyframes prog{from{width:0%}to{width:85%}}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="splash-logo">📦</div>
  <div class="splash-title">VeoYoca</div>
  <div class="splash-sub">Cargando datos compartidos...</div>
  <div class="splash-spinner"></div>
</div>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">📦</div>
  <div class="login-title">VeoYoca</div>
  <div class="login-sub">Sistema de gestión de pedidos</div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div class="field">
      <label>Usuario</label>
      <input type="text" id="l-user" placeholder="Tu usuario" autocomplete="username">
    </div>
    <div class="field">
      <label>Contraseña</label>
      <input type="password" id="l-pass" placeholder="••••••" autocomplete="current-password">
    </div>
    <button class="btn-primary" onclick="login()">Entrar</button>
    <div class="login-err" id="l-err">Usuario o contraseña incorrectos</div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <div class="topbar">
    <div class="topbar-left">
      <div>
        <h1>VeoYoca</h1>
        <p id="topbar-sub">Pedidos</p>
      </div>
    </div>
    <div class="avatar" id="user-avatar" onclick="mostrarPerfil()">--</div>
  </div>

  <div class="content" id="content"></div>

  <div class="navbar">
    <button class="nav-btn on" onclick="goTab('home',this)" id="nb-home">
      <div class="nav-icon">📋</div><div>Pedidos</div>
    </button>
    <button class="nav-btn" onclick="goTab('entregar',this)" id="nb-entregar">
      <div class="nav-icon">🚚</div><div>Despacho</div>
    </button>
    <button class="nav-btn" onclick="goTab('nuevo',this)" id="nb-nuevo">
      <div class="nav-icon">➕</div><div>Nuevo</div>
    </button>
    <button class="nav-btn" onclick="goTab('reportes',this)" id="nb-reportes">
      <div class="nav-icon">📊</div><div>Reportes</div>
    </button>
    <button class="nav-btn" onclick="goTab('ia',this)" id="nb-ia">
      <div class="nav-icon">🤖</div><div>IA</div>
    </button>
    <button class="nav-btn" onclick="goTab('plan',this)" id="nb-plan">
      <div class="nav-icon">🗺️</div><div>Rutas</div>
    </button>
    <button class="nav-btn" id="nb-admin" onclick="goTab('admin',this)" style="display:none">
      <div class="nav-icon">⚙️</div><div>Admin</div>
    </button>
  </div>
</div>

<!-- SYNC BADGE -->
<div class="sync-badge" id="sync-badge">✓ Guardado</div>

<!-- MODAL EDITAR -->
<div class="overlay" id="modal-edit">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2 id="modal-titulo">Editar pedido</h2>
      <button class="sheet-close" onclick="cerrarModal('modal-edit')">✕</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="e-id">
      <div class="sfield"><label>Cliente</label><input type="text" id="e-cliente"></div>
      <div class="sfield-row">
        <div class="sfield"><label>Ciudad</label><input type="text" id="e-ciudad"></div>
        <div class="sfield"><label>Vendedor</label>
          <select id="e-vendedor"><option value="">Sin cambio</option></select>
        </div>
      </div>
      <div class="sfield-row">
        <div class="sfield"><label>Fecha límite</label><input type="date" id="e-fecha"></div>
        <div class="sfield"><label>Estado</label>
          <select id="e-estado">
            <option value="">Sin cambio</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN PROCESO">En proceso</option>
            <option value="LISTO">Listo para entregar</option>
          </select>
        </div>
      </div>
      <div class="sfield"><label>Descripción</label>
        <textarea id="e-desc" placeholder="Productos, medidas, colores..."></textarea>
      </div>
      <div class="sfield-row">
        <div class="sfield"><label>Proveedor</label><input type="text" id="e-proveedor" placeholder="Ej: ORION, COLVEN..."></div>
        <div class="sfield"><label># Orden de compra</label><input type="text" id="e-oc" placeholder="Ej: OC-2026-045"></div>
      </div>
      <div class="sfield"><label>Nota / Observación</label>
        <input type="text" id="e-nota" placeholder="Observación adicional">
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-edit')">Cancelar</button>
      <button class="btn btn-blue" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- MODAL PERFIL -->
<div class="overlay" id="modal-perfil">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2>Mi perfil</h2>
      <button class="sheet-close" onclick="cerrarModal('modal-perfil')">✕</button>
    </div>
    <div class="sheet-body" id="perfil-body"></div>
    <div class="sheet-foot">
      <button class="btn btn-red" onclick="logout()">Cerrar sesión</button>
    </div>
  </div>
</div>

<!-- MODAL NUEVO USUARIO -->
<div class="overlay" id="modal-usuario">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2 id="u-titulo">Nuevo usuario</h2>
      <button class="sheet-close" onclick="cerrarModal('modal-usuario')">✕</button>
    </div>
    <div class="sheet-body">
      <input type="hidden" id="u-id">
      <div class="sfield"><label>Nombre completo</label><input type="text" id="u-nombre" placeholder="Ej: María López"></div>
      <div class="sfield-row">
        <div class="sfield"><label>Usuario</label><input type="text" id="u-user" placeholder="marialopez"></div>
        <div class="sfield"><label>Contraseña</label><input type="password" id="u-pass" placeholder="••••••"></div>
      </div>
      <div class="sfield"><label>Rol</label>
        <select id="u-rol">
          <option value="empleado">Empleado</option>
          <option value="admin">Administrador</option>
        </select>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-usuario')">Cancelar</button>
      <button class="btn btn-dark" onclick="guardarUsuario()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============================================================
// VEOYOCA — Almacenamiento compartido vía window.storage
// Los datos se sincronizan entre todos los dispositivos
// ============================================================

var DB = { usuarios: [], pedidos: [], bitacora: [] };
var SESSION = null;
var PEDIDO_EDIT_ID = null;
var TAB = 'home';
var SAVING = false;

// ── STORAGE HELPERS ──────────────────────────────────────────
async function storageGet(key) {
  try {
    var result = await window.storage.get(key, true); // shared=true
    if (result && result.value) return JSON.parse(result.value);
  } catch(e) {}
  return null;
}

async function storageSet(key, value) {
  try {
    await window.storage.set(key, JSON.stringify(value), true); // shared=true
    return true;
  } catch(e) { return false; }
}

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  mostrarSincronizando();
  await cargarDB();
  if (!DB.usuarios.length) await crearAdminInicial();

  // Sesión guardada localmente (solo identidad, no datos)
  var sess = null;
  try { sess = JSON.parse(localStorage.getItem('veo_session') || 'null'); } catch(e){}
  if (sess) {
    var u = DB.usuarios.find(function(x){return x.id===sess.id;});
    if (u) { SESSION = u; mostrarApp(); return; }
  }

  document.getElementById('splash').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('l-user').focus();
  document.getElementById('l-user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('l-pass').focus();});
  document.getElementById('l-pass').addEventListener('keydown',function(e){if(e.key==='Enter')login();});
}

function mostrarSincronizando() {
  document.getElementById('splash').style.display = 'flex';
}

async function crearAdminInicial() {
  DB.usuarios = [{
    id: 'admin', nombre: 'Administrador',
    username: 'admin', password: 'admin123',
    rol: 'admin', creado: fecha()
  }];
  await guardarDB();
}

// ── AUTH ──────────────────────────────────────────────────────
async function login() {
  var u = document.getElementById('l-user').value.trim().toLowerCase();
  var p = document.getElementById('l-pass').value;
  // Recargar DB antes de validar (por si hay cambios recientes)
  await cargarDB();
  var usuario = DB.usuarios.find(function(x){return x.username.toLowerCase()===u && x.password===p;});
  if (!usuario) {
    document.getElementById('l-err').style.display='block';
    return;
  }
  SESSION = usuario;
  localStorage.setItem('veo_session', JSON.stringify({id: usuario.id}));
  mostrarApp();
}

function logout() {
  SESSION = null;
  localStorage.removeItem('veo_session');
  location.reload();
}

function mostrarApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-avatar').textContent = SESSION.nombre.substring(0,2).toUpperCase();
  document.getElementById('topbar-sub').textContent = SESSION.nombre;
  if (SESSION.rol==='admin') document.getElementById('nb-admin').style.display='flex';
  goTab('home', document.getElementById('nb-home'));
}

// ── DB ── Usa window.storage compartido ──────────────────────
async function cargarDB() {
  try {
    var usuarios  = await storageGet('veo_usuarios');
    var pedidos   = await storageGet('veo_pedidos');
    var bitacora  = await storageGet('veo_bitacora');
    DB.usuarios  = usuarios  || [];
    DB.pedidos   = pedidos   || [];
    DB.bitacora  = bitacora  || [];
  } catch(e) {
    DB = { usuarios: [], pedidos: [], bitacora: [] };
  }
}

async function guardarDB() {
  if (SAVING) return;
  SAVING = true;
  mostrarBadge('syncing');
  try {
    await storageSet('veo_usuarios',  DB.usuarios);
    await storageSet('veo_pedidos',   DB.pedidos);
    await storageSet('veo_bitacora',  DB.bitacora);
    mostrarBadge('ok');
  } catch(e) {
    mostrarBadge('err');

// ── HELPERS ──────────────────────────────────────────────────
function diasRestantes(f) {
  if (!f) return null;
  var p=f.split('/'); if(p.length!==3)return null;
  var d=parseInt(p[0]),m=parseInt(p[1])-1,y=parseInt(p[2]);
  if(y<100)y+=2000;
  var dt=new Date(y,m,d); dt.setHours(0,0,0,0);
  var hoy=new Date(); hoy.setHours(0,0,0,0);
  return isNaN(dt.getTime())?null:Math.round((dt-hoy)/86400000);
}

function clasif(p) {
  if (p.estatus==='ENTREGADO') return 'done';
  var d=diasRestantes(p.fechaLimite);
  if(d===null)return 'sf';
  if(d<0)return 'vencido';
  if(d<=7)return 'urgente';
  return 'ok';
}

function badgeHTML(p) {
  var d=diasRestantes(p.fechaLimite);
  if(p.estatus==='LISTO')return '<span class="badge b-success">Listo</span>';
  if(p.estatus==='EN PROCESO')return '<span class="badge b-info">En proceso</span>';
  if(d===null)return '<span class="badge b-muted">Sin fecha</span>';
  if(d<0)return '<span class="badge b-danger">Vencido '+Math.abs(d)+'d</span>';
  if(d<=7)return '<span class="badge b-warning">En '+d+'d</span>';
  return '<span class="badge b-muted">En '+d+'d</span>';
}

function fechaInput(f){
  if(!f)return '';
  var p=f.split('/');if(p.length!==3)return '';
  var y=p[2];if(y.length===2)y='20'+y;
  return y+'-'+('0'+p[1]).slice(-2)+'-'+('0'+p[0]).slice(-2);
}

function inputFecha(f){
  if(!f)return '';
  var p=f.split('-');if(p.length!==3)return '';
  return p[2]+'/'+p[1]+'/'+p[0];
}

function filtrarHome() {
  var b  = (document.getElementById('h-buscar')||{value:''}).value.toLowerCase();
  var fe = (document.getElementById('h-est')||{value:''}).value;
  var lista = DB.pedidos.filter(function(p){
    if(p.estatus==='ENTREGADO')return false;
    var mb=!b||((p.cliente||'').toLowerCase().indexOf(b)>=0||(p.id||'').toLowerCase().indexOf(b)>=0||(p.numero||'').toLowerCase().indexOf(b)>=0);
    var mfe=!fe||clasif(p)===fe||(fe==='LISTO'&&p.estatus==='LISTO');
    return mb&&mfe;
  });
  lista.sort(function(a,b){
    var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);
    if(da===null&&db===null)return 0;
    if(da===null)return 1;if(db===null)return -1;
    return da-db;
  });
  var el = document.getElementById('home-lista');
  if(!el)return;
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>No hay pedidos pendientes</div>';return;}
  var g={vencido:[],urgente:[],sf:[],ok:[],LISTO:[]};
  lista.forEach(function(p){var c=p.estatus==='LISTO'?'LISTO':clasif(p);if(g[c])g[c].push(p);else g.ok.push(p);});
  var etq={vencido:'Vencidos',urgente:'Urgentes',sf:'Sin fecha',ok:'Con tiempo',LISTO:'Listos para entregar'};
  var h='';
  ['vencido','urgente','LISTO','sf','ok'].forEach(function(t){
    if(!g[t]||!g[t].length)return;
    h+='<div class="sec-label">'+etq[t]+' ('+g[t].length+')</div>';
    g[t].forEach(function(p){h+=cardHTML(p,false);});
  });
  el.innerHTML=h;
}

async function crearPedido() {
  var cliente=document.getElementById('n-cliente').value.trim();
  var desc=document.getElementById('n-desc').value.trim();
  if(!cliente||!desc){toast('Cliente y descripción son obligatorios','err');return;}
  var numeroManual=document.getElementById('n-numero').value.trim();
  var maxNum=0;
  DB.pedidos.forEach(function(p){var n=parseInt(p.numero||0);if(n>maxNum)maxNum=n;});
  var numero=numeroManual||String(maxNum+1);
  var p={
    id:uid(),numero:numero,
    cliente:cliente,
    ciudad:document.getElementById('n-ciudad').value,
    vendedor:document.getElementById('n-vendedor').value,
    proveedor:document.getElementById('n-proveedor').value.trim(),
    ordenCompra:document.getElementById('n-oc').value.trim(),
    fechaLimite:inputFecha(document.getElementById('n-fecha').value),
    estatus:document.getElementById('n-estado').value||'PENDIENTE',
    descripcion:desc,
    creadoPor:SESSION.username,
    creadoPorNombre:SESSION.nombre,
    fechaCreacion:fecha(),
    horaCreacion:hora()
  };
  DB.pedidos.push(p);
  registrarBitacora(p.id,'CREADO por '+SESSION.nombre);
  await guardarDB();
  ['n-numero','n-cliente','n-ciudad','n-proveedor','n-oc','n-fecha','n-desc'].forEach(function(id){
    document.getElementById(id).value='';
  });
  toast('Pedido #'+numero+' creado — guardado para todos','ok');
}

async function guardarEdicion() {
  var id=PEDIDO_EDIT_ID;
  var p=DB.pedidos.find(function(x){return x.id===id;});
  if(!p)return;
  var cambios=[];
  var cliente=document.getElementById('e-cliente').value.trim();
  var ciudad=document.getElementById('e-ciudad').value.trim();
  var vend=document.getElementById('e-vendedor').value;
  var fecha2=inputFecha(document.getElementById('e-fecha').value);
  var estado=document.getElementById('e-estado').value;
  var desc=document.getElementById('e-desc').value.trim();
  var nota=document.getElementById('e-nota').value.trim();
  var prov=document.getElementById('e-proveedor').value.trim();
  var oc=document.getElementById('e-oc').value.trim();
  if(cliente&&cliente!==p.cliente){cambios.push('cliente');p.cliente=cliente;}
  if(ciudad&&ciudad!==p.ciudad){cambios.push('ciudad');p.ciudad=ciudad;}
  if(vend&&vend!==p.vendedor){cambios.push('vendedor');p.vendedor=vend;}
  if(fecha2&&fecha2!==p.fechaLimite){cambios.push('fechaLimite');p.fechaLimite=fecha2;}
  if(estado&&estado!==p.estatus){cambios.push('estatus');p.estatus=estado;}
  if(desc&&desc!==p.descripcion){cambios.push('descripcion');p.descripcion=desc;}
  if(prov&&prov!==p.proveedor){cambios.push('proveedor');p.proveedor=prov;}
  if(oc&&oc!==p.ordenCompra){cambios.push('ordenCompra');p.ordenCompra=oc;}
  if(nota){cambios.push('nota');p.nota=nota;}
  if(!cambios.length){cerrarModal('modal-edit');toast('Sin cambios','warn');return;}
  p.ultimaEdicion=fecha()+' '+hora();
  p.editadoPor=SESSION.nombre;
  registrarBitacora(id,'EDICION ('+cambios.join(', ')+') por '+SESSION.nombre+(nota?' | Nota: '+nota:''));
  await guardarDB();
  cerrarModal('modal-edit');
  goTab(TAB,document.getElementById('nb-'+TAB));
  toast('Pedido actualizado para todos','ok');
}

  var total=DB.pedidos.length;

  var pend=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';}).length;
  var venc=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='vencido';}).length;
  var listos=DB.pedidos.filter(function(p){return p.estatus==='LISTO';}).length;
  var hoy=fecha();
  var entHoy=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO'&&p.fechaEntrega===hoy;}).length;
  var pct=total?Math.round((ent/total)*100):0;
  var porVend={};
  DB.pedidos.forEach(function(p){
    var v=p.vendedor||'Sin vendedor';

    porVend[v].total++;
    if(p.estatus==='ENTREGADO')porVend[v].ent++;

  var vendArr=[];
  for(var v in porVend)vendArr.push({v:v,t:porVend[v].total,e:porVend[v].ent});
  vendArr.sort(function(a,b){return b.t-a.t;});
  var maxT=vendArr.length?vendArr[0].t:1;
  var bit=DB.bitacora.slice(-10).reverse();

  var html='<div class="report-grid">'
    +'<div class="report-card"><div class="report-val" style="color:var(--accent)">'+total+'</div><div class="report-label">Total pedidos</div></div>'

    +'<div class="report-card"><div class="report-val" style="color:var(--danger)">'+venc+'</div><div class="report-label">Vencidos</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--info)">'+listos+'</div><div class="report-label">Listos</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--success)">'+entHoy+'</div><div class="report-label">Entregados hoy</div></div>'
    +'<div class="report-card"><div class="report-val">'+pct+'%</div><div class="report-label">Completados</div></div>'
    +'<div class="report-card"><div class="report-val">'+DB.bitacora.length+'</div><div class="report-label">Acciones</div></div>'
    +'</div>';
  if(vendArr.length){
    html+='<div class="chart-wrap"><div class="chart-title">Pedidos por vendedor</div>';
    vendArr.slice(0,8).forEach(function(item){
      var pctV=Math.round((item.t/maxT)*100);
      html+='<div class="bar-row"><div class="bar-label">'+item.v.split(' ')[0]+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+pctV+'%;background:var(--accent)"></div></div>'
        +'<div class="bar-val">'+item.t+'</div></div>';
    });
    html+='</div>';
  }
  if(bit.length){
    html+='<div class="chart-wrap"><div class="chart-title">Actividad reciente</div>';
    bit.forEach(function(b){
      html+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px">'
        +'<div style="font-weight:600;color:var(--text)">'+(b.accion||'').substring(0,60)+'</div>'
        +'<div style="color:var(--muted);margin-top:2px">'+b.fecha+' '+b.hora+'</div></div>';
    });
    html+='</div>';
  }
  c.innerHTML=html;
}

async function guardarUsuario() {
  var nombre=document.getElementById('u-nombre').value.trim();
  var user=document.getElementById('u-user').value.trim().toLowerCase();
  var pass=document.getElementById('u-pass').value;
  var rol=document.getElementById('u-rol').value;
  var eid=document.getElementById('u-id').value;
  if(!nombre||!user||!pass){toast('Todos los campos son obligatorios','err');return;}
  var existe=DB.usuarios.find(function(x){return x.username===user&&x.id!==eid;});
  if(existe){toast('El usuario ya existe','err');return;}
  if(eid){
    var u=DB.usuarios.find(function(x){return x.id===eid;});
    if(u){u.nombre=nombre;u.username=user;u.password=pass;u.rol=rol;}
  } else {
    DB.usuarios.push({id:uid(),nombre:nombre,username:user,password:pass,rol:rol,creado:fecha()});
  }
  await guardarDB();
  cerrarModal('modal-usuario');
  goTab('admin',document.getElementById('nb-admin'));
  toast('Usuario guardado','ok');
}

async function eliminarUsuario(id) {
  if(!confirm('¿Eliminar este usuario?'))return;
  DB.usuarios=DB.usuarios.filter(function(x){return x.id!==id;});
  await guardarDB();
  goTab('admin',document.getElementById('nb-admin'));
  toast('Usuario eliminado','warn');
}

async function borrarPedidos() {

  DB.pedidos=[];

  {nombre:'Occidente / Otros',ciudades:[]}
];

function getZona(ciudad) {
  if(!ciudad)return 'Sin ciudad';
  var cu=ciudad.toUpperCase().trim();
  for(var i=0;i<ZONAS.length-1;i++)
    for(var j=0;j<ZONAS[i].ciudades.length;j++)
      if(cu.indexOf(ZONAS[i].ciudades[j])>=0||ZONAS[i].ciudades[j].indexOf(cu)>=0)return ZONAS[i].nombre;
  return ciudad;
}

function armarViajes(grupos,zonasOrdenadas){
  var viajes=[];
  var zonasLocal=['Maracaibo Norte','Maracaibo Centro','Maracaibo Sur'];
  var pedsLocal=[];
  zonasLocal.forEach(function(z){if(grupos[z])pedsLocal=pedsLocal.concat(grupos[z]);});
  if(pedsLocal.length)viajes.push({zonas:['Maracaibo'],pedidos:pedsLocal});
  var combos=[
    ['Sur del lago','Cabimas / C. Ojeda'],['Machiques / Perija'],['Coro / Falcón'],
    ['Barquisimeto'],['San Cristóbal'],['Mérida / Los Andes'],['Barinas / Llanos'],
    ['Valencia / Carabobo','Caracas / Centro'],['Oriente']
  ];
  combos.forEach(function(combo){
    var peds=[],zonasP=[];
    combo.forEach(function(z){if(grupos[z]&&grupos[z].length){peds=peds.concat(grupos[z]);zonasP.push(z);}});
    if(peds.length){
      peds.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});
      viajes.push({zonas:zonasP,pedidos:peds});
    }
  });
  var zonasUsadas=zonasLocal.concat(['Sur del lago','Cabimas / C. Ojeda','Machiques / Perija','Coro / Falcón','Barquisimeto','San Cristóbal','Mérida / Los Andes','Barinas / Llanos','Valencia / Carabobo','Caracas / Centro','Oriente']);
  var pedsSueltos=[],zonasSueltas=[];
  zonasOrdenadas.forEach(function(z){if(zonasUsadas.indexOf(z)<0&&grupos[z]&&grupos[z].length){pedsSueltos=pedsSueltos.concat(grupos[z]);zonasSueltas.push(z);}});
  if(pedsSueltos.length)viajes.push({zonas:zonasSueltas.length?zonasSueltas:['Otras zonas'],pedidos:pedsSueltos});
  return viajes.filter(function(v){return v.pedidos.length>0;});
}

function calcFlete(vi,numPedidos){
  var monto=parseFloat(document.getElementById('flete-'+vi).value)||0;
  var el=document.getElementById('flete-result-'+vi);
  if(!monto||!el)return;
  var porPed=(monto/numPedidos).toFixed(2);
  el.innerHTML='<span style="color:#16a34a;font-weight:600">$'+porPed+' por pedido</span> <span style="color:#9ca3af">('+numPedidos+' pedidos · total $'+monto.toFixed(2)+')</span>';
}

  localStorage.setItem('veo_apikey', k);
  toast('Clave guardada en este dispositivo', 'ok');
  renderPlanIA(document.getElementById('content'));
}

function cambiarAPIKey() {
  localStorage.removeItem('veo_apikey');
  renderPlanIA(document.getElementById('content'));
}

function generarPlanIA() {
  var pendientes = DB.pedidos.filter(function(p){ return p.estatus !== 'ENTREGADO'; });
  if (!pendientes.length) { toast('No hay pedidos pendientes', 'warn'); return; }
  var API_KEY = localStorage.getItem('veo_apikey') || '';
  if (!API_KEY) { toast('Configura tu API Key primero', 'err'); return; }

  var btn = document.getElementById('btn-ia');
  if (btn) { btn.disabled = true; btn.textContent = '⏳ Analizando pedidos...'; }

  var res = document.getElementById('ia-resultado');
  if (res) {
    res.innerHTML = '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;text-align:center">'
      + '<div style="font-size:32px;margin-bottom:10px">🔄</div>'
      + '<div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:4px">Claude está analizando tus pedidos...</div>'
      + '<div style="font-size:12px;color:#6b7280">Esto toma unos segundos</div>'
      + '<div style="margin-top:14px;height:4px;background:#e5e7eb;border-radius:99px;overflow:hidden">'
      + '<div style="height:100%;width:0%;background:linear-gradient(90deg,#1a1a2e,#16a34a);border-radius:99px;transition:width 3s ease" id="ia-prog"></div>'
      + '</div></div>';
    setTimeout(function(){ var p=document.getElementById('ia-prog'); if(p)p.style.width='85%'; }, 100);
  }

  var hoy = new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});
  var opcRutas    = document.getElementById('ia-rutas')    ? document.getElementById('ia-rutas').checked    : true;
  var opcAlertas  = document.getElementById('ia-alertas')  ? document.getElementById('ia-alertas').checked  : true;
  var opcConsol   = document.getElementById('ia-consolidados') ? document.getElementById('ia-consolidados').checked : true;
  var opcCostos   = document.getElementById('ia-costos')   ? document.getElementById('ia-costos').checked   : true;

  var listaPedidos = pendientes.map(function(p) {
    var d = diasRestantes(p.fechaLimite);
    return '- Pedido #' + (p.numero||p.id.substring(0,6))
      + ' | Cliente: ' + (p.cliente||'?')
      + ' | Ciudad: ' + (p.ciudad||'Sin ciudad')
      + ' | Vendedor: ' + (p.vendedor||'?')
      + ' | Fecha límite: ' + (p.fechaLimite||'Sin fecha')
      + ' | Días restantes: ' + (d!==null?d:'Sin fecha')
      + ' | Estado: ' + (p.estatus||'PENDIENTE')
      + ' | Proveedor: ' + (p.proveedor||'-')
      + ' | OC: ' + (p.ordenCompra||'-')
      + ' | Descripción: ' + (p.descripcion||'').substring(0,80);
  }).join('\n');

  var prompt = 'Eres el asistente de logística de una empresa venezolana de equipos comerciales (estanterías, neveras, carros de supermercado, etc). Hoy es ' + hoy + '.\n\n'
    + 'Tengo ' + pendientes.length + ' pedidos pendientes de entrega. Analízalos y dame un plan completo:\n\n'
    + listaPedidos + '\n\n'
    + 'Por favor genera:\n'
    + (opcRutas ? '1. PLAN DE RUTAS: Agrupa los pedidos por zona geográfica de Venezuela y arma viajes en orden óptimo. Para cada viaje indica: zonas que cubre, pedidos en orden de parada, por qué ese orden, urgencia del viaje.\n' : '')
    + (opcAlertas ? '2. ALERTAS CRÍTICAS: Lista los pedidos que necesitan atención inmediata con el motivo específico y la acción recomendada.\n' : '')
    + (opcConsol ? '3. CONSOLIDADOS DE CARGA: Sugiere qué pedidos meter en cada camión para optimizar espacio y ruta.\n' : '')
    + (opcCostos ? '4. DIVISIÓN DE COSTOS: Para cada consolidado, explica cómo dividir el costo del flete entre los pedidos.\n' : '')
    + '\nResponde en español, con formato claro usando emojis para identificar secciones. Sé específico con los números de pedido. Si un pedido tiene fecha vencida, indícalo claramente.';

  fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': API_KEY,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: MODELO,
      max_tokens: 4000,
      messages: [{ role: 'user', content: prompt }]
    })
  })
  .then(function(r){ return r.json(); })
  .then(function(data) {
    var texto = '';
    if (data.content && data.content[0] && data.content[0].text) texto = data.content[0].text;
    else if (data.error) texto = '❌ Error: ' + data.error.message;
    mostrarResultadoIA(texto);
    if (btn) { btn.disabled = false; btn.textContent = '✨ Generar nuevo plan'; }
  })
  .catch(function(err) {
    mostrarResultadoIA('❌ Error al conectar con Claude: ' + err.message);
    if (btn) { btn.disabled = false; btn.textContent = '✨ Reintentar'; }
  });
}

function mostrarResultadoIA(texto) {
  var res = document.getElementById('ia-resultado');
  if (!res) return;
  var html = texto
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
    .replace(/\*(.+?)\*/g,'<em>$1</em>')
    .replace(/^#{1,3} (.+)$/gm,'<div style="font-size:15px;font-weight:700;color:#1a1a2e;margin:16px 0 8px">$1</div>')
    .replace(/^- (.+)$/gm,'<div style="padding:3px 0 3px 12px;border-left:3px solid #e5e7eb;margin:4px 0;font-size:13px">$1</div>')
    .replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');

  res.innerHTML = '<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden">'
    + '<div style="background:linear-gradient(135deg,#1a1a2e,#2d2d5e);padding:12px 16px;display:flex;justify-content:space-between;align-items:center">'
    + '<div style="color:#fff;font-size:13px;font-weight:600">🤖 Plan generado por Claude</div>'
    + '<button onclick="copiarPlan()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Copiar</button>'
    + '</div>'
    + '<div style="padding:16px;font-size:13px;line-height:1.7;color:#374151" id="ia-texto">' + html + '</div>'
    + '<div style="padding:12px 16px;border-top:1px solid #e5e7eb;display:flex;gap:8px">'
    + '<button class="btn btn-ghost btn-sm" onclick="generarPlanIA()">🔄 Regenerar</button>'
    + '<button class="btn btn-ghost btn-sm" onclick="exportarPlanIA()">📄 Exportar</button>'
    + '</div></div>';
  localStorage.setItem('veo_planIA', JSON.stringify({fecha:fecha(),hora:hora(),texto:texto}));
}

function copiarPlan() {
  var el = document.getElementById('ia-texto');
  if (!el) return;
  navigator.clipboard.writeText(el.innerText||el.textContent).then(function(){ toast('Plan copiado','ok'); }).catch(function(){ toast('No se pudo copiar','err'); });
}

function exportarPlanIA() {
  var planIA = null;
  try { planIA = JSON.parse(localStorage.getItem('veo_planIA')||'null'); } catch(e){}
  if (!planIA) return;
  var a = document.createElement('a');
  a.href = 'data:text/plain;charset=utf-8,' + encodeURIComponent(planIA.texto);
  a.download = 'plan_IA_' + planIA.fecha.replace(/\//g,'-') + '.txt';
  a.click();
}

// ── START ─────────────────────────────────────────────────────
init();
</script>
</body>
</html>
