<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="VeoYoca">
<title>VeoYoca — Sistema de Pedidos</title>
<style>
:root{
  --accent:#1a1a2e;--accent2:#2d2d5e;--success:#16a34a;--danger:#dc2626;
  --warning:#d97706;--info:#1d4ed8;--bg:#f4f4f8;--card:#fff;
  --border:#e5e7eb;--text:#111827;--muted:#6b7280;
  --sbg:#f0fdf4;--dbg:#fef2f2;--wbg:#fffbeb;--ibg:#eff6ff;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit}
input,select,textarea{font-family:inherit}
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent)}
.splash-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px}
.splash-title{color:#fff;font-size:22px;font-weight:700}
.splash-sub{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
.splash-spinner{margin-top:32px;width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--accent)}
.login-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px}
.login-title{color:#fff;font-size:24px;font-weight:600;margin-bottom:4px}
.login-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px}
.login-card h2{font-size:16px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:14px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff;transition:border-color .2s}
.field input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;margin-top:4px}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:16px;font-weight:600}
.topbar p{font-size:11px;opacity:.6;margin-top:1px}
.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
.navbar{background:var(--accent);display:flex;border-top:1px solid rgba(255,255,255,.1);position:sticky;bottom:0;z-index:50}
.nav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;transition:color .2s}
.nav-btn.on{color:#fff}
.nav-icon{font-size:20px;line-height:1}
.content{flex:1;overflow-y:auto;padding-bottom:8px}
.sync-badge{position:fixed;top:56px;right:12px;background:var(--success);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-badge.show{opacity:1}
.sync-badge.syncing{background:var(--info)}
.sync-badge.err{background:var(--danger)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--accent2)}
.stat{text-align:center;padding:10px 4px;border-right:1px solid rgba(255,255,255,.1)}
.stat:last-child{border:none}
.stat-v{font-size:20px;font-weight:600;color:#fff}
.stat-l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.prog-wrap{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border)}
.prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s}
.prog-label{font-size:11px;color:var(--muted)}
.section-pad{padding:12px 14px}
.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}
.card-num{font-size:12px;font-weight:600;color:var(--muted);min-width:42px}
.card-body{flex:1;min-width:0}
.card-cliente{font-size:15px;font-weight:600}
.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.card-desc{font-size:12px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-vend{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:#e8f0fe;color:#1a1a2e;margin-top:4px;font-weight:600}
.card-foot{border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-foot input{flex:1;min-width:100px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0}
.b-danger{background:var(--dbg);color:var(--danger)}
.b-warning{background:var(--wbg);color:var(--warning)}
.b-success{background:var(--sbg);color:var(--success)}
.b-info{background:var(--ibg);color:var(--info)}
.b-muted{background:#f3f4f6;color:var(--muted)}
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}
.btn-dark{background:var(--accent);color:#fff}
.btn-green{background:var(--success);color:#fff}
.btn-blue{background:var(--info);color:#fff}
.btn-red{background:var(--danger);color:#fff}
.btn-ghost{background:#f3f4f6;color:var(--text)}
.btn-sm{padding:5px 11px;font-size:12px}
.toolbar{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.toolbar input{flex:1;min-width:140px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}
.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto;padding-bottom:env(safe-area-inset-bottom)}
.sheet-handle{width:36px;height:4px;background:#e5e7eb;border-radius:99px;margin:12px auto 0}
.sheet-head{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sheet-head h2{font-size:16px;font-weight:600}
.sheet-close{background:none;border:none;font-size:22px;color:var(--muted);padding:0 4px;line-height:1}
.sheet-body{padding:16px 18px}
.sfield{margin-bottom:14px}
.sfield label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sfield input,.sfield select,.sfield textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:#fff}
.sfield input:focus,.sfield select:focus,.sfield textarea:focus{outline:none;border-color:var(--accent)}
.sfield textarea{resize:vertical;min-height:80px}
.sfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px}
.report-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.report-val{font-size:28px;font-weight:700;margin-bottom:4px}
.report-label{font-size:12px;color:var(--muted)}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;padding:14px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--muted);min-width:80px;text-align:right}
.bar-track{flex:1;height:18px;background:#f3f4f6;border-radius:99px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.bar-val{font-size:12px;font-weight:600;min-width:28px}
.admin-section{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;overflow:hidden}
.admin-row{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.admin-row:last-child{border:none}
.admin-info{flex:1;min-width:0}
.admin-name{font-size:14px;font-weight:600}
.admin-meta{font-size:12px;color:var(--muted);margin-top:1px}
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}
.role-admin{background:#fef3c7;color:#92400e}
.role-emp{background:#e0e7ff;color:#3730a3}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center;font-weight:500}
.toast.show{opacity:1}
.toast.t-ok{background:var(--success)}
.toast.t-err{background:var(--danger)}
.toast.t-warn{background:var(--warning)}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}
.empty-icon{font-size:40px;margin-bottom:10px}
@keyframes prog{from{width:0%}to{width:85%}}
</style>
</head>
<body>

<div id="splash">
  <div class="splash-logo">📦</div>
  <div class="splash-title">VeoYoca</div>
  <div class="splash-sub" id="splash-msg">Conectando con la nube...</div>
  <div class="splash-spinner"></div>
</div>

<div id="login-screen">
  <div class="login-logo">📦</div>
  <div class="login-title">VeoYoca</div>
  <div class="login-sub">Sistema de gestión de pedidos</div>
  <div class="login-card">
    <h2>Iniciar sesión</h2>
    <div class="field"><label>Usuario</label><input type="text" id="l-user" placeholder="Tu usuario" autocomplete="username"></div>
    <div class="field"><label>Contraseña</label><input type="password" id="l-pass" placeholder="••••••" autocomplete="current-password"></div>
    <button class="btn-primary" onclick="login()">Entrar</button>
    <div class="login-err" id="l-err">Usuario o contraseña incorrectos</div>
  </div>
</div>

<div id="app">
  <div class="topbar">
    <div><h1>VeoYoca</h1><p id="topbar-sub">Pedidos</p></div>
    <div class="avatar" id="user-avatar" onclick="mostrarPerfil()">--</div>
  </div>
  <div class="content" id="content"></div>
  <div class="navbar">
    <button class="nav-btn on" onclick="goTab('home',this)" id="nb-home"><div class="nav-icon">📋</div><div>Pedidos</div></button>
    <button class="nav-btn" onclick="goTab('entregar',this)" id="nb-entregar"><div class="nav-icon">🚚</div><div>Despacho</div></button>
    <button class="nav-btn" onclick="goTab('nuevo',this)" id="nb-nuevo"><div class="nav-icon">➕</div><div>Nuevo</div></button>
    <button class="nav-btn" onclick="goTab('reportes',this)" id="nb-reportes"><div class="nav-icon">📊</div><div>Reportes</div></button>
    <button class="nav-btn" onclick="goTab('ia',this)" id="nb-ia"><div class="nav-icon">🤖</div><div>IA</div></button>
    <button class="nav-btn" onclick="goTab('plan',this)" id="nb-plan"><div class="nav-icon">🗺️</div><div>Rutas</div></button>
    <button class="nav-btn" id="nb-admin" onclick="goTab('admin',this)" style="display:none"><div class="nav-icon">⚙️</div><div>Admin</div></button>
  </div>
</div>

<div class="sync-badge" id="sync-badge">✓ Guardado</div>

<!-- MODAL EDITAR -->
<div class="overlay" id="modal-edit">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h2 id="modal-titulo">Editar pedido</h2><button class="sheet-close" onclick="cerrarModal('modal-edit')">✕</button></div>
    <div class="sheet-body">
      <input type="hidden" id="e-id">
      <div class="sfield"><label>Cliente</label><input type="text" id="e-cliente"></div>
      <div class="sfield-row">
        <div class="sfield"><label>Ciudad</label><input type="text" id="e-ciudad"></div>
        <div class="sfield"><label>Vendedor</label><select id="e-vendedor"><option value="">Sin cambio</option></select></div>
      </div>
      <div class="sfield-row">
        <div class="sfield"><label>Fecha límite</label><input type="date" id="e-fecha"></div>
        <div class="sfield"><label>Estado</label>
          <select id="e-estado">
            <option value="">Sin cambio</option>
            <option value="PENDIENTE">Pendiente</option>
            <option value="EN PROCESO">En proceso</option>
            <option value="LISTO">Listo para entregar</option>
          </select>
        </div>
      </div>
      <div class="sfield"><label>Descripción</label><textarea id="e-desc" placeholder="Productos, medidas, colores..."></textarea></div>
      <div class="sfield-row">
        <div class="sfield"><label>Proveedor</label><input type="text" id="e-proveedor" placeholder="Ej: ORION, COLVEN..."></div>
        <div class="sfield"><label># Orden de compra</label><input type="text" id="e-oc" placeholder="Ej: OC-2026-045"></div>
      </div>
      <div class="sfield"><label>Nota / Observación</label><input type="text" id="e-nota" placeholder="Observación adicional"></div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-edit')">Cancelar</button>
      <button class="btn btn-blue" onclick="guardarEdicion()">Guardar cambios</button>
    </div>
  </div>
</div>

<!-- MODAL PERFIL -->
<div class="overlay" id="modal-perfil">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h2>Mi perfil</h2><button class="sheet-close" onclick="cerrarModal('modal-perfil')">✕</button></div>
    <div class="sheet-body" id="perfil-body"></div>
    <div class="sheet-foot"><button class="btn btn-red" onclick="logout()">Cerrar sesión</button></div>
  </div>
</div>

<!-- MODAL USUARIO -->
<div class="overlay" id="modal-usuario">
  <div class="sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head"><h2 id="u-titulo">Nuevo usuario</h2><button class="sheet-close" onclick="cerrarModal('modal-usuario')">✕</button></div>
    <div class="sheet-body">
      <input type="hidden" id="u-id">
      <div class="sfield"><label>Nombre completo</label><input type="text" id="u-nombre" placeholder="Ej: María López"></div>
      <div class="sfield-row">
        <div class="sfield"><label>Usuario</label><input type="text" id="u-user" placeholder="marialopez"></div>
        <div class="sfield"><label>Contraseña</label><input type="password" id="u-pass" placeholder="••••••"></div>
      </div>
      <div class="sfield"><label>Rol</label>
        <select id="u-rol"><option value="empleado">Empleado</option><option value="admin">Administrador</option></select>
      </div>
    </div>
    <div class="sheet-foot">
      <button class="btn btn-ghost" onclick="cerrarModal('modal-usuario')">Cancelar</button>
      <button class="btn btn-dark" onclick="guardarUsuario()">Guardar</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- FIREBASE SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyD-fyGTFiZgn_FfZN-VC0fS_rFNtVsg5kc",
  authDomain: "veoyoca-54caf.firebaseapp.com",
  projectId: "veoyoca-54caf",
  storageBucket: "veoyoca-54caf.firebasestorage.app",
  messagingSenderId: "510700319861",
  appId: "1:510700319861:web:1cc96074cec81134a7f43c"
};

const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

// ── DB en memoria ─────────────────────────────────────────────
window.DB = { usuarios: [], pedidos: [], bitacora: [] };
window.SESSION = null;
window.TAB = 'home';
window.PEDIDO_EDIT_ID = null;
var SAVING = false;

// ── GUARDAR EN FIREBASE ───────────────────────────────────────
window.guardarDB = async function() {
  if (SAVING) return;
  SAVING = true;
  mostrarBadge('syncing');
  try {
    await setDoc(doc(db, 'veoyoca', 'data'), {
      usuarios: DB.usuarios,
      pedidos:  DB.pedidos,
      bitacora: DB.bitacora.slice(-500),
      updatedAt: Date.now()
    });
    mostrarBadge('ok');
  } catch(e) {
    mostrarBadge('err');
    toast('Error al guardar: ' + e.message, 'err');
  }
  SAVING = false;
};

// ── INIT ─────────────────────────────────────────────────────
async function init() {
  document.getElementById('splash-msg').textContent = 'Conectando con Firebase...';
  try {
    const snap = await getDoc(doc(db, 'veoyoca', 'data'));
    if (snap.exists()) {
      const d = snap.data();
      DB.usuarios = d.usuarios  || [];
      DB.pedidos  = d.pedidos   || [];
      DB.bitacora = d.bitacora  || [];
    } else {
      // Primera vez — crear admin
      DB.usuarios = [{ id:'admin', nombre:'Administrador', username:'admin', password:'admin123', rol:'admin', creado: fecha() }];
      await guardarDB();
    }
  } catch(e) {
    document.getElementById('splash-msg').textContent = 'Error de conexión: ' + e.message;
    return;
  }

  // Escuchar cambios en tiempo real de otros usuarios
  onSnapshot(doc(db, 'veoyoca', 'data'), (snap) => {
    if (!snap.exists()) return;
    const d = snap.data();
    // Solo actualizar si no somos nosotros los que guardamos
    if (!SAVING) {
      DB.usuarios = d.usuarios || [];
      DB.pedidos  = d.pedidos  || [];
      DB.bitacora = d.bitacora || [];
      // Si hay una vista abierta, refrescarla silenciosamente
      if (window.SESSION && window.TAB) {
        var nb = document.getElementById('nb-' + window.TAB);
        if (nb) goTab(window.TAB, nb);
      }
    }
  });

  // Sesión local
  var sess = null;
  try { sess = JSON.parse(localStorage.getItem('veo_session') || 'null'); } catch(e){}
  if (sess) {
    var u = DB.usuarios.find(function(x){ return x.id === sess.id; });
    if (u) { SESSION = u; mostrarApp(); return; }
  }

  document.getElementById('splash').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  setTimeout(function(){ document.getElementById('l-user').focus(); }, 100);
  document.getElementById('l-user').addEventListener('keydown', function(e){ if(e.key==='Enter') document.getElementById('l-pass').focus(); });
  document.getElementById('l-pass').addEventListener('keydown', function(e){ if(e.key==='Enter') login(); });
}

// ── AUTH ──────────────────────────────────────────────────────
window.login = function() {
  var u = document.getElementById('l-user').value.trim().toLowerCase();
  var p = document.getElementById('l-pass').value;
  var usuario = DB.usuarios.find(function(x){ return x.username.toLowerCase()===u && x.password===p; });
  if (!usuario) { document.getElementById('l-err').style.display='block'; return; }
  SESSION = usuario;
  localStorage.setItem('veo_session', JSON.stringify({id: usuario.id}));
  mostrarApp();
};

window.logout = function() {
  SESSION = null;
  localStorage.removeItem('veo_session');
  location.reload();
};

function mostrarApp() {
  document.getElementById('splash').style.display = 'none';
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
  document.getElementById('user-avatar').textContent = SESSION.nombre.substring(0,2).toUpperCase();
  document.getElementById('topbar-sub').textContent = SESSION.nombre;
  if (SESSION.rol==='admin') document.getElementById('nb-admin').style.display='flex';
  goTab('home', document.getElementById('nb-home'));
}

// ── HELPERS ──────────────────────────────────────────────────
window.fecha = function() { return new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'}); };
window.hora  = function() { return new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'}); };
window.uid   = function() { return Date.now().toString(36)+Math.random().toString(36).substr(2,5); };

window.diasRestantes = function(f) {
  if (!f) return null;
  var p=f.split('/'); if(p.length!==3)return null;
  var d=parseInt(p[0]),m=parseInt(p[1])-1,y=parseInt(p[2]);
  if(y<100)y+=2000;
  var dt=new Date(y,m,d); dt.setHours(0,0,0,0);
  var hoy=new Date(); hoy.setHours(0,0,0,0);
  return isNaN(dt.getTime())?null:Math.round((dt-hoy)/86400000);
};

window.clasif = function(p) {
  if (p.estatus==='ENTREGADO') return 'done';
  var d=diasRestantes(p.fechaLimite);
  if(d===null)return 'sf'; if(d<0)return 'vencido'; if(d<=7)return 'urgente'; return 'ok';
};

window.badgeHTML = function(p) {
  var d=diasRestantes(p.fechaLimite);
  if(p.estatus==='LISTO')return '<span class="badge b-success">Listo</span>';
  if(p.estatus==='EN PROCESO')return '<span class="badge b-info">En proceso</span>';
  if(d===null)return '<span class="badge b-muted">Sin fecha</span>';
  if(d<0)return '<span class="badge b-danger">Vencido '+Math.abs(d)+'d</span>';
  if(d<=7)return '<span class="badge b-warning">En '+d+'d</span>';
  return '<span class="badge b-muted">En '+d+'d</span>';
};

window.fechaInput = function(f){ if(!f)return ''; var p=f.split('/');if(p.length!==3)return ''; var y=p[2];if(y.length===2)y='20'+y; return y+'-'+('0'+p[1]).slice(-2)+'-'+('0'+p[0]).slice(-2); };
window.inputFecha = function(f){ if(!f)return ''; var p=f.split('-');if(p.length!==3)return ''; return p[2]+'/'+p[1]+'/'+p[0]; };

function mostrarBadge(tipo) {
  var b = document.getElementById('sync-badge');
  b.className = 'sync-badge show'+(tipo==='syncing'?' syncing':tipo==='err'?' err':'');
  b.textContent = tipo==='syncing'?'🔄 Guardando...':tipo==='err'?'❌ Error':'✓ Guardado';
  if (tipo!=='syncing') setTimeout(function(){ b.className='sync-badge'; }, 2500);
}

window.toast = function(msg,tipo){
  var t=document.getElementById('toast');
  t.textContent=msg;
  t.className='toast show'+(tipo==='ok'?' t-ok':tipo==='err'?' t-err':tipo==='warn'?' t-warn':'');
  setTimeout(function(){t.className='toast';},4000);
};

window.cerrarModal = function(id){ document.getElementById(id).classList.remove('open'); };

window.registrarBitacora = function(pedidoId, accion) {
  DB.bitacora.push({pedidoId,accion,usuario:SESSION.nombre,fecha:fecha(),hora:hora()});
  if(DB.bitacora.length>500) DB.bitacora=DB.bitacora.slice(-500);
};

window.goTab = function(tab, btn) {
  TAB = tab;
  document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});
  if (btn) btn.classList.add('on');
  var titulos={home:'Pedidos',entregar:'Despacho',nuevo:'Nuevo pedido',reportes:'Reportes',admin:'Administración',plan:'Plan de Rutas',ia:'Plan IA'};
  document.getElementById('topbar-sub').textContent = titulos[tab]||SESSION.nombre;
  var c = document.getElementById('content');
  if(tab==='home') renderHome(c);
  else if(tab==='entregar') renderEntregar(c);
  else if(tab==='nuevo') renderNuevo(c);
  else if(tab==='reportes') renderReportes(c);
  else if(tab==='admin') renderAdmin(c);
  else if(tab==='plan') renderPlanificacion(c);
  else if(tab==='ia') renderPlanIA(c);
};

    +'<div class="stat"><div class="stat-v" style="color:#fcd34d">'+urg+'</div><div class="stat-l">urgentes</div></div>'

    +'<select id="h-est" onchange="filtrarHome()"><option value="">Todos</option><option value="vencido">Vencidos</option><option value="urgente">Urgentes</option><option value="sf">Sin fecha</option><option value="ok">Con tiempo</option><option value="LISTO">Listos</option></select></div>'
    +'<div class="section-pad" id="home-lista"></div>';
  filtrarHome();
};

window.filtrarHome = function() {
  var b=(document.getElementById('h-buscar')||{value:''}).value.toLowerCase();
  var fe=(document.getElementById('h-est')||{value:''}).value;
  var lista=DB.pedidos.filter(function(p){
    if(p.estatus==='ENTREGADO')return false;
    var mb=!b||((p.cliente||'').toLowerCase().indexOf(b)>=0||(p.numero||'').indexOf(b)>=0);
    var mfe=!fe||clasif(p)===fe||(fe==='LISTO'&&p.estatus==='LISTO');
    return mb&&mfe;
  });
  lista.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});
  var el=document.getElementById('home-lista'); if(!el)return;
  if(!lista.length){el.innerHTML='<div class="empty"><div class="empty-icon">✅</div>No hay pedidos pendientes</div>';return;}
  var g={vencido:[],urgente:[],sf:[],ok:[],LISTO:[]};
  lista.forEach(function(p){var c=p.estatus==='LISTO'?'LISTO':clasif(p);if(g[c])g[c].push(p);else g.ok.push(p);});
  var etq={vencido:'Vencidos',urgente:'Urgentes',sf:'Sin fecha',ok:'Con tiempo',LISTO:'Listos para entregar'};
  var h='';
  ['vencido','urgente','LISTO','sf','ok'].forEach(function(t){
    if(!g[t]||!g[t].length)return;
    h+='<div class="sec-label">'+etq[t]+' ('+g[t].length+')</div>';
    g[t].forEach(function(p){h+=cardHTML(p,false);});
  });
  el.innerHTML=h;
};

window.cardHTML = function(p, conEntregar) {
  var canEdit=SESSION.rol==='admin'||SESSION.username===p.creadoPor||SESSION.username===p.vendedor;
  return '<div class="card" id="card-'+p.id+'">'
    +'<div class="card-head"><div class="card-num">#'+(p.numero||p.id.substring(0,6))+'</div>'
    +'<div class="card-body"><div class="card-cliente">'+(p.cliente||'Sin nombre')+'</div>'
    +'<div class="card-meta">'+(p.ciudad||'—')+(p.vendedor?' · '+p.vendedor:'')+'</div>'
    +(p.vendedor?'<span class="card-vend">'+p.vendedor+'</span>':'')
    +(p.proveedor?'<span class="card-vend" style="background:#fef3c7;color:#92400e;margin-left:4px">'+p.proveedor+(p.ordenCompra?' · OC: '+p.ordenCompra:'')+'</span>':'')
    +'<div class="card-desc">'+(p.descripcion||'—')+'</div></div>'+badgeHTML(p)+'</div>'
    +'<div class="card-foot">'
    +(canEdit?'<button class="btn btn-ghost btn-sm" onclick="abrirEditar(\''+p.id+'\')">Editar</button>':'')
    +(conEntregar&&p.estatus!=='ENTREGADO'
      ?'<input type="text" id="nota-'+p.id+'" placeholder="Nota de entrega...">'
       +'<button class="btn btn-green btn-sm" onclick="marcarEntregado(\''+p.id+'\')">Entregar ✓</button>':'')
    +'</div></div>';
};

window.renderEntregar = function(c) {
  var listos=DB.pedidos.filter(function(p){return p.estatus==='LISTO';});
  var urgentes=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='urgente';});
  var vencidos=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='vencido';});
  var html='<div class="section-pad">';
  if(!listos.length&&!urgentes.length&&!vencidos.length){html+='<div class="empty"><div class="empty-icon">🎉</div>No hay pedidos urgentes ni listos</div>';}
  else{
    if(listos.length){html+='<div class="sec-label">Listos para entregar ('+listos.length+')</div>';listos.forEach(function(p){html+=cardHTML(p,true);});}
    var un=urgentes.filter(function(p){return p.estatus!=='LISTO';});
    if(un.length){html+='<div class="sec-label">Urgentes</div>';un.forEach(function(p){html+=cardHTML(p,true);});}
    var vn=vencidos.filter(function(p){return p.estatus!=='LISTO'&&clasif(p)!=='urgente';});
    if(vn.length){html+='<div class="sec-label">Vencidos</div>';vn.forEach(function(p){html+=cardHTML(p,true);});}
  }
  c.innerHTML=html+'</div>';
};

window.marcarEntregado = async function(id) {
  var p=DB.pedidos.find(function(x){return x.id===id;}); if(!p)return;
  var nota=(document.getElementById('nota-'+id)||{}).value||'';
  p.estatus='ENTREGADO'; p.fechaEntrega=fecha(); p.notaEntrega=nota; p.entregadoPor=SESSION.nombre;
  registrarBitacora(id,'ENTREGADO. Nota: '+nota);
  await guardarDB();

  if(card){card.style.opacity='.4';card.querySelector('.card-foot').innerHTML='<span style="color:var(--success);font-size:13px;font-weight:600">✓ Entregado hoy</span>';}
  toast('Pedido #'+(p.numero||id.substring(0,6))+' entregado','ok');
};

window.crearPedido = async function() {
  var cliente=document.getElementById('n-cliente').value.trim();
  var desc=document.getElementById('n-desc').value.trim();
  if(!cliente||!desc){toast('Cliente y descripción son obligatorios','err');return;}
  var num=document.getElementById('n-numero').value.trim();
  var maxN=0; DB.pedidos.forEach(function(p){var n=parseInt(p.numero||0);if(n>maxN)maxN=n;});
  var numero=num||String(maxN+1);
  var p={id:uid(),numero,cliente,ciudad:document.getElementById('n-ciudad').value,
    vendedor:document.getElementById('n-vendedor').value,
    proveedor:document.getElementById('n-proveedor').value.trim(),
    ordenCompra:document.getElementById('n-oc').value.trim(),
    fechaLimite:inputFecha(document.getElementById('n-fecha').value),
    estatus:document.getElementById('n-estado').value||'PENDIENTE',
    descripcion:desc,creadoPor:SESSION.username,creadoPorNombre:SESSION.nombre,
    fechaCreacion:fecha(),horaCreacion:hora()};
  DB.pedidos.push(p);
  registrarBitacora(p.id,'CREADO por '+SESSION.nombre);
  await guardarDB();
  ['n-numero','n-cliente','n-ciudad','n-proveedor','n-oc','n-fecha','n-desc'].forEach(function(id){document.getElementById(id).value='';});
  toast('Pedido #'+numero+' creado y guardado en la nube ☁️','ok');
};

window.abrirEditar = function(id) {
  var p=DB.pedidos.find(function(x){return x.id===id;}); if(!p)return;
  PEDIDO_EDIT_ID=id;
  document.getElementById('modal-titulo').textContent='Editar pedido #'+(p.numero||id.substring(0,6));
  document.getElementById('e-id').value=id;
  document.getElementById('e-cliente').value=p.cliente||'';
  document.getElementById('e-ciudad').value=p.ciudad||'';
  document.getElementById('e-fecha').value=fechaInput(p.fechaLimite);
  document.getElementById('e-desc').value=p.descripcion||'';
  document.getElementById('e-proveedor').value=p.proveedor||'';
  document.getElementById('e-oc').value=p.ordenCompra||'';
  document.getElementById('e-nota').value='';
  var vsel=document.getElementById('e-vendedor');
  vsel.innerHTML='<option value="">Sin cambio</option>';
  DB.usuarios.forEach(function(u){var o=document.createElement('option');o.value=u.nombre;o.textContent=u.nombre;if(u.nombre===p.vendedor)o.selected=true;vsel.appendChild(o);});
  document.getElementById('e-estado').value=p.estatus||'';
  document.getElementById('modal-edit').classList.add('open');
};

window.guardarEdicion = async function() {
  var id=PEDIDO_EDIT_ID;
  var p=DB.pedidos.find(function(x){return x.id===id;}); if(!p)return;
  var cambios=[];
  var vals={cliente:document.getElementById('e-cliente').value.trim(),ciudad:document.getElementById('e-ciudad').value.trim(),
    vendedor:document.getElementById('e-vendedor').value,fechaLimite:inputFecha(document.getElementById('e-fecha').value),
    estatus:document.getElementById('e-estado').value,descripcion:document.getElementById('e-desc').value.trim(),
    proveedor:document.getElementById('e-proveedor').value.trim(),ordenCompra:document.getElementById('e-oc').value.trim()};
  var nota=document.getElementById('e-nota').value.trim();
  for(var k in vals){if(vals[k]&&vals[k]!==p[k]){cambios.push(k);p[k]=vals[k];}}
  if(nota){cambios.push('nota');p.nota=nota;}
  if(!cambios.length){cerrarModal('modal-edit');toast('Sin cambios','warn');return;}
  p.ultimaEdicion=fecha()+' '+hora(); p.editadoPor=SESSION.nombre;
  registrarBitacora(id,'EDICION ('+cambios.join(', ')+') por '+SESSION.nombre+(nota?' | Nota: '+nota:''));
  await guardarDB();
  cerrarModal('modal-edit');
  goTab(TAB,document.getElementById('nb-'+TAB));
  toast('Pedido actualizado para todos ☁️','ok');
};

// ── REPORTES ──────────────────────────────────────────────────
window.renderReportes = function(c) {
  var total=DB.pedidos.length,ent=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO';}).length;
  var pend=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';}).length;
  var venc=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO'&&clasif(p)==='vencido';}).length;
  var listos=DB.pedidos.filter(function(p){return p.estatus==='LISTO';}).length;
  var entHoy=DB.pedidos.filter(function(p){return p.estatus==='ENTREGADO'&&p.fechaEntrega===fecha();}).length;
  var pct=total?Math.round((ent/total)*100):0;
  var pv={};
  DB.pedidos.forEach(function(p){var v=p.vendedor||'Sin vendedor';if(!pv[v])pv[v]={t:0,e:0};pv[v].t++;if(p.estatus==='ENTREGADO')pv[v].e++;});
  var va=[]; for(var v in pv)va.push({v,t:pv[v].t,e:pv[v].e}); va.sort(function(a,b){return b.t-a.t;});
  var maxT=va.length?va[0].t:1;
  var bit=DB.bitacora.slice(-10).reverse();
  var html='<div class="report-grid">'
    +'<div class="report-card"><div class="report-val" style="color:var(--accent)">'+total+'</div><div class="report-label">Total pedidos</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--success)">'+ent+'</div><div class="report-label">Entregados</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--warning)">'+pend+'</div><div class="report-label">Pendientes</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--danger)">'+venc+'</div><div class="report-label">Vencidos</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--info)">'+listos+'</div><div class="report-label">Listos</div></div>'
    +'<div class="report-card"><div class="report-val" style="color:var(--success)">'+entHoy+'</div><div class="report-label">Entregados hoy</div></div>'
    +'<div class="report-card"><div class="report-val">'+pct+'%</div><div class="report-label">Completados</div></div>'
    +'<div class="report-card"><div class="report-val">'+DB.bitacora.length+'</div><div class="report-label">Acciones</div></div>'
    +'</div>';
  if(va.length){
    html+='<div class="chart-wrap"><div class="chart-title">Pedidos por vendedor</div>';
    va.slice(0,8).forEach(function(item){
      html+='<div class="bar-row"><div class="bar-label">'+item.v.split(' ')[0]+'</div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.round((item.t/maxT)*100)+'%;background:var(--accent)"></div></div>'
        +'<div class="bar-val">'+item.t+'</div></div>';
    });
    html+='</div>';
  }
  if(bit.length){
    html+='<div class="chart-wrap"><div class="chart-title">Actividad reciente</div>';
    bit.forEach(function(b){html+='<div style="padding:6px 0;border-bottom:1px solid var(--border);font-size:12px"><div style="font-weight:600">'+(b.accion||'').substring(0,60)+'</div><div style="color:var(--muted);margin-top:2px">'+b.fecha+' '+b.hora+'</div></div>';});
    html+='</div>';
  }
  c.innerHTML=html;
};

window.editarUsuario = function(id){

  document.getElementById('u-titulo').textContent='Editar usuario';
  document.getElementById('u-id').value=id;

  document.getElementById('u-user').value=u.username;

window.getZona = function(ciudad){
  if(!ciudad)return 'Sin ciudad';
  var cu=ciudad.toUpperCase().trim();
  for(var i=0;i<ZONAS.length-1;i++) for(var j=0;j<ZONAS[i].ciudades.length;j++) if(cu.indexOf(ZONAS[i].ciudades[j])>=0||ZONAS[i].ciudades[j].indexOf(cu)>=0) return ZONAS[i].nombre;
  return ciudad;
};

window.armarViajes = function(grupos,zo){
  var viajes=[];
  var zl=['Maracaibo Norte','Maracaibo Centro','Maracaibo Sur'];
  var pl=[]; zl.forEach(function(z){if(grupos[z])pl=pl.concat(grupos[z]);});
  if(pl.length)viajes.push({zonas:['Maracaibo'],pedidos:pl});
  [['Sur del lago','Cabimas / C. Ojeda'],['Machiques / Perija'],['Coro / Falcón'],['Barquisimeto'],['San Cristóbal'],['Mérida / Los Andes'],['Barinas / Llanos'],['Valencia / Carabobo','Caracas / Centro'],['Oriente']].forEach(function(combo){
    var peds=[],zp=[];
    combo.forEach(function(z){if(grupos[z]&&grupos[z].length){peds=peds.concat(grupos[z]);zp.push(z);}});
    if(peds.length){peds.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});viajes.push({zonas:zp,pedidos:peds});}
  });
  var zu=zl.concat(['Sur del lago','Cabimas / C. Ojeda','Machiques / Perija','Coro / Falcón','Barquisimeto','San Cristóbal','Mérida / Los Andes','Barinas / Llanos','Valencia / Carabobo','Caracas / Centro','Oriente']);
  var ps=[],zs=[];
  zo.forEach(function(z){if(zu.indexOf(z)<0&&grupos[z]&&grupos[z].length){ps=ps.concat(grupos[z]);zs.push(z);}});
  if(ps.length)viajes.push({zonas:zs.length?zs:['Otras zonas'],pedidos:ps});
  return viajes.filter(function(v){return v.pedidos.length>0;});
};

window.generarPlanIA = function(){
  var pends=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';});
  if(!pends.length){toast('No hay pedidos pendientes','warn');return;}
  var API_KEY=localStorage.getItem('veo_apikey')||'';
  if(!API_KEY){toast('Configura tu API Key primero','err');return;}
  var btn=document.getElementById('btn-ia');
  if(btn){btn.disabled=true;btn.textContent='⏳ Analizando...';}
  var res=document.getElementById('ia-resultado');
  if(res)res.innerHTML='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;text-align:center"><div style="font-size:32px;margin-bottom:10px">🔄</div><div style="font-size:14px;font-weight:600;color:#1a1a2e;margin-bottom:4px">Claude analizando pedidos...</div><div style="font-size:12px;color:#6b7280">Esto toma unos segundos</div></div>';
  var hoy=new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});
  var oR=document.getElementById('ia-rutas')?.checked!==false;
  var oA=document.getElementById('ia-alertas')?.checked!==false;
  var oC=document.getElementById('ia-consolidados')?.checked!==false;
  var oCo=document.getElementById('ia-costos')?.checked!==false;
  var lista=pends.map(function(p){
    var d=diasRestantes(p.fechaLimite);
    return '- Pedido #'+(p.numero||p.id.substring(0,6))+' | Cliente: '+(p.cliente||'?')+' | Ciudad: '+(p.ciudad||'Sin ciudad')+' | Vendedor: '+(p.vendedor||'?')+' | Fecha límite: '+(p.fechaLimite||'Sin fecha')+' | Días restantes: '+(d!==null?d:'Sin fecha')+' | Estado: '+(p.estatus||'PENDIENTE')+' | Descripción: '+(p.descripcion||'').substring(0,80);
  }).join('\n');
  var prompt='Eres el asistente de logística de una empresa venezolana de equipos comerciales. Hoy es '+hoy+'.\n\nTengo '+pends.length+' pedidos pendientes:\n\n'+lista+'\n\nGenera:\n'
    +(oR?'1. PLAN DE RUTAS: Agrupa por zona geográfica de Venezuela, orden óptimo de paradas, urgencia del viaje.\n':'')
    +(oA?'2. ALERTAS CRÍTICAS: Pedidos que necesitan atención inmediata con motivo y acción recomendada.\n':'')
    +(oC?'3. CONSOLIDADOS DE CARGA: Qué pedidos meter en cada camión para optimizar espacio y ruta.\n':'')
    +(oCo?'4. DIVISIÓN DE COSTOS: Cómo dividir el flete entre los pedidos de cada consolidado.\n':'')
    +'\nResponde en español con emojis para identificar secciones. Sé específico con los números de pedido.';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODELO,max_tokens:4000,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();})
  .then(function(data){
    var texto='';
    if(data.content&&data.content[0]&&data.content[0].text)texto=data.content[0].text;
    else if(data.error)texto='❌ Error: '+data.error.message;
    mostrarResultadoIA(texto);
    if(btn){btn.disabled=false;btn.textContent='✨ Generar nuevo plan';}
