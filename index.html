<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<meta name="theme-color" content="#1a1a2e">
<title>VeoYoca — Sistema de Pedidos</title>
<style>
:root{--accent:#1a1a2e;--accent2:#2d2d5e;--success:#16a34a;--danger:#dc2626;--warning:#d97706;--info:#1d4ed8;--bg:#f4f4f8;--card:#fff;--border:#e5e7eb;--text:#111827;--muted:#6b7280;--sbg:#f0fdf4;--dbg:#fef2f2;--wbg:#fffbeb;--ibg:#eff6ff}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);font-size:15px;min-height:100vh}
button{cursor:pointer;font-family:inherit}input,select,textarea{font-family:inherit}
#splash{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;background:var(--accent)}
.splash-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:16px}
.splash-title{color:#fff;font-size:22px;font-weight:700}.splash-sub{color:rgba(255,255,255,.5);font-size:13px;margin-top:4px}
.splash-spinner{margin-top:32px;width:32px;height:32px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#login-screen{display:none;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:24px;background:var(--accent)}
.login-logo{width:72px;height:72px;background:#fff;border-radius:20px;display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:20px}
.login-title{color:#fff;font-size:24px;font-weight:600;margin-bottom:4px}.login-sub{color:rgba(255,255,255,.6);font-size:13px;margin-bottom:32px}
.login-card{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:340px}.login-card h2{font-size:16px;font-weight:600;margin-bottom:20px}
.field{margin-bottom:14px}.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:500;text-transform:uppercase;letter-spacing:.05em}
.field input{width:100%;padding:11px 14px;border:1.5px solid var(--border);border-radius:10px;font-size:15px;color:var(--text);background:#fff}
.field input:focus{outline:none;border-color:var(--accent)}
.btn-primary{width:100%;padding:13px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-size:15px;font-weight:600;margin-top:4px}
.login-err{color:var(--danger);font-size:13px;text-align:center;margin-top:10px;display:none}
#app{display:none;flex-direction:column;min-height:100vh}
.topbar{background:var(--accent);color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar h1{font-size:16px;font-weight:600}.topbar p{font-size:11px;opacity:.6;margin-top:1px}
.avatar{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:#fff;cursor:pointer}
.navbar{background:var(--accent);display:flex;border-top:1px solid rgba(255,255,255,.1);position:sticky;bottom:0;z-index:50}
.nav-btn{flex:1;padding:10px 4px 12px;background:none;border:none;color:rgba(255,255,255,.5);display:flex;flex-direction:column;align-items:center;gap:3px;font-size:10px;transition:color .2s}
.nav-btn.on{color:#fff}.nav-icon{font-size:20px;line-height:1}.content{flex:1;overflow-y:auto;padding-bottom:8px}
.sync-badge{position:fixed;top:56px;right:12px;background:var(--success);color:#fff;font-size:11px;font-weight:600;padding:4px 10px;border-radius:99px;z-index:60;opacity:0;transition:opacity .3s;pointer-events:none}
.sync-badge.show{opacity:1}.sync-badge.syncing{background:var(--info)}.sync-badge.err{background:var(--danger)}
.stats-bar{display:grid;grid-template-columns:repeat(4,1fr);background:var(--accent2)}
.stat{text-align:center;padding:10px 4px;border-right:1px solid rgba(255,255,255,.1)}.stat:last-child{border:none}
.stat-v{font-size:20px;font-weight:600;color:#fff}.stat-l{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.04em;margin-top:1px}
.prog-wrap{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border)}
.prog-bar{height:6px;background:var(--border);border-radius:99px;overflow:hidden;margin-bottom:3px}
.prog-fill{height:100%;background:var(--success);border-radius:99px;transition:width .4s}.prog-label{font-size:11px;color:var(--muted)}
.section-pad{padding:12px 14px}.sec-label{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin:12px 0 6px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.card-head{padding:12px 14px;display:flex;gap:10px;align-items:flex-start}.card-num{font-size:12px;font-weight:600;color:var(--muted);min-width:42px}
.card-body{flex:1;min-width:0}.card-cliente{font-size:15px;font-weight:600}.card-meta{font-size:12px;color:var(--muted);margin-top:2px}
.card-desc{font-size:12px;color:var(--muted);margin-top:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-vend{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;background:#e8f0fe;color:#1a1a2e;margin-top:4px;font-weight:600}
.card-foot{border-top:1px solid var(--border);padding:8px 14px;display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-foot input{flex:1;min-width:100px;padding:6px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.badge{display:inline-block;font-size:10px;font-weight:600;padding:3px 9px;border-radius:99px;flex-shrink:0}
.b-danger{background:var(--dbg);color:var(--danger)}.b-warning{background:var(--wbg);color:var(--warning)}
.b-success{background:var(--sbg);color:var(--success)}.b-info{background:var(--ibg);color:var(--info)}.b-muted{background:#f3f4f6;color:var(--muted)}
.btn{border:none;border-radius:8px;padding:7px 14px;font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:opacity .15s}
.btn:disabled{opacity:.45;cursor:not-allowed}.btn-dark{background:var(--accent);color:#fff}.btn-green{background:var(--success);color:#fff}
.btn-blue{background:var(--info);color:#fff}.btn-red{background:var(--danger);color:#fff}.btn-ghost{background:#f3f4f6;color:var(--text)}.btn-sm{padding:5px 11px;font-size:12px}
.toolbar{padding:8px 14px;background:#fff;border-bottom:1px solid var(--border);display:flex;gap:8px;flex-wrap:wrap}
.toolbar input,.toolbar select{padding:7px 10px;border:1px solid var(--border);border-radius:8px;font-size:13px;background:#fff;color:var(--text)}
.toolbar input{flex:1;min-width:140px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:100;align-items:flex-end;justify-content:center}
.overlay.open{display:flex}.sheet{background:#fff;border-radius:20px 20px 0 0;width:100%;max-width:500px;max-height:90vh;overflow-y:auto}
.sheet-handle{width:36px;height:4px;background:#e5e7eb;border-radius:99px;margin:12px auto 0}
.sheet-head{padding:14px 18px 10px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid var(--border)}
.sheet-head h2{font-size:16px;font-weight:600}.sheet-close{background:none;border:none;font-size:22px;color:var(--muted);padding:0 4px;line-height:1}
.sheet-body{padding:16px 18px}.sfield{margin-bottom:14px}
.sfield label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.sfield input,.sfield select,.sfield textarea{width:100%;padding:10px 12px;border:1.5px solid var(--border);border-radius:10px;font-size:14px;color:var(--text);background:#fff}
.sfield input:focus,.sfield select:focus,.sfield textarea:focus{outline:none;border-color:var(--accent)}
.sfield textarea{resize:vertical;min-height:80px}.sfield-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sheet-foot{padding:12px 18px;border-top:1px solid var(--border);display:flex;gap:8px;justify-content:flex-end}
.report-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:14px}
.report-card{background:#fff;border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center}
.report-val{font-size:28px;font-weight:700;margin-bottom:4px}.report-label{font-size:12px;color:var(--muted)}
.chart-wrap{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;padding:14px}
.chart-title{font-size:13px;font-weight:600;margin-bottom:12px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}.bar-label{font-size:12px;color:var(--muted);min-width:80px;text-align:right}
.bar-track{flex:1;height:18px;background:#f3f4f6;border-radius:99px;overflow:hidden}.bar-fill{height:100%;border-radius:99px;transition:width .6s}
.bar-val{font-size:12px;font-weight:600;min-width:28px}
.admin-section{background:#fff;border:1px solid var(--border);border-radius:12px;margin:0 14px 14px;overflow:hidden}
.admin-row{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.admin-row:last-child{border:none}.admin-info{flex:1;min-width:0}.admin-name{font-size:14px;font-weight:600}.admin-meta{font-size:12px;color:var(--muted);margin-top:1px}
.role-badge{font-size:10px;font-weight:600;padding:2px 8px;border-radius:99px}.role-admin{background:#fef3c7;color:#92400e}.role-emp{background:#e0e7ff;color:#3730a3}
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--accent);color:#fff;padding:11px 20px;border-radius:10px;font-size:14px;z-index:200;opacity:0;transition:opacity .25s;pointer-events:none;max-width:88vw;text-align:center;font-weight:500}
.toast.show{opacity:1}.toast.t-ok{background:var(--success)}.toast.t-err{background:var(--danger)}.toast.t-warn{background:var(--warning)}
.empty{text-align:center;padding:48px 20px;color:var(--muted);font-size:14px}.empty-icon{font-size:40px;margin-bottom:10px}
</style>
</head>
<body>
<div id="splash"><div class="splash-logo">&#x1F4E6;</div><div class="splash-title">VeoYoca</div><div class="splash-sub" id="splash-msg">Conectando con Firebase...</div><div class="splash-spinner"></div></div>
<div id="login-screen"><div class="login-logo">&#x1F4E6;</div><div class="login-title">VeoYoca</div><div class="login-sub">Sistema de gesti&#xF3;n de pedidos</div>
<div class="login-card"><h2>Iniciar sesi&#xF3;n</h2>
<div class="field"><label>Usuario</label><input type="text" id="l-user" placeholder="Tu usuario" autocomplete="username"></div>
<div class="field"><label>Contrase&#xF1;a</label><input type="password" id="l-pass" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;" autocomplete="current-password"></div>
<button class="btn-primary" onclick="login()">Entrar</button><div class="login-err" id="l-err">Usuario o contrase&#xF1;a incorrectos</div></div></div>
<div id="app">
<div class="topbar"><div><h1>VeoYoca</h1><p id="topbar-sub">Pedidos</p></div><div class="avatar" id="user-avatar" onclick="mostrarPerfil()">--</div></div>
<div class="content" id="content"></div>
<div class="navbar">
<button class="nav-btn on" onclick="goTab('home',this)" id="nb-home"><div class="nav-icon">&#x1F4CB;</div><div>Pedidos</div></button>
<button class="nav-btn" onclick="goTab('entregar',this)" id="nb-entregar"><div class="nav-icon">&#x1F69A;</div><div>Despacho</div></button>
<button class="nav-btn" onclick="goTab('nuevo',this)" id="nb-nuevo"><div class="nav-icon">&#x2795;</div><div>Nuevo</div></button>
<button class="nav-btn" onclick="goTab('reportes',this)" id="nb-reportes"><div class="nav-icon">&#x1F4CA;</div><div>Reportes</div></button>
<button class="nav-btn" onclick="goTab('ia',this)" id="nb-ia"><div class="nav-icon">&#x1F916;</div><div>IA</div></button>
<button class="nav-btn" onclick="goTab('plan',this)" id="nb-plan"><div class="nav-icon">&#x1F5FA;</div><div>Rutas</div></button>
<button class="nav-btn" id="nb-admin" onclick="goTab('admin',this)" style="display:none"><div class="nav-icon">&#x2699;&#xFE0F;</div><div>Admin</div></button>
</div></div>
<div class="sync-badge" id="sync-badge">&#x2713; Guardado</div>
<div class="overlay" id="modal-edit"><div class="sheet"><div class="sheet-handle"></div>
<div class="sheet-head"><h2 id="modal-titulo">Editar pedido</h2><button class="sheet-close" onclick="cerrarModal('modal-edit')">&#x2715;</button></div>
<div class="sheet-body"><input type="hidden" id="e-id">
<div class="sfield"><label>Cliente</label><input type="text" id="e-cliente"></div>
<div class="sfield-row"><div class="sfield"><label>Ciudad</label><input type="text" id="e-ciudad"></div>
<div class="sfield"><label>Vendedor</label><select id="e-vendedor"><option value="">Sin cambio</option></select></div></div>
<div class="sfield-row"><div class="sfield"><label>Fecha l&#xED;mite</label><input type="date" id="e-fecha"></div>
<div class="sfield"><label>Estado</label><select id="e-estado"><option value="">Sin cambio</option><option value="PENDIENTE">Pendiente</option><option value="EN PROCESO">En proceso</option><option value="LISTO">Listo para entregar</option></select></div></div>
<div class="sfield"><label>Descripci&#xF3;n</label><textarea id="e-desc" placeholder="Productos, medidas, colores..."></textarea></div>
<div class="sfield-row"><div class="sfield"><label>Proveedor</label><input type="text" id="e-proveedor" placeholder="Ej: ORION, COLVEN..."></div>
<div class="sfield"><label># Orden de compra</label><input type="text" id="e-oc" placeholder="Ej: OC-2026-045"></div></div>
<div class="sfield"><label>Nota / Observaci&#xF3;n</label><input type="text" id="e-nota" placeholder="Observaci&#xF3;n adicional"></div></div>
<div class="sheet-foot"><button class="btn btn-ghost" onclick="cerrarModal('modal-edit')">Cancelar</button><button class="btn btn-blue" onclick="guardarEdicion()">Guardar cambios</button></div></div></div>
<div class="overlay" id="modal-perfil"><div class="sheet"><div class="sheet-handle"></div>
<div class="sheet-head"><h2>Mi perfil</h2><button class="sheet-close" onclick="cerrarModal('modal-perfil')">&#x2715;</button></div>
<div class="sheet-body" id="perfil-body"></div>
<div class="sheet-foot"><button class="btn btn-red" onclick="logout()">Cerrar sesi&#xF3;n</button></div></div></div>
<div class="overlay" id="modal-usuario"><div class="sheet"><div class="sheet-handle"></div>
<div class="sheet-head"><h2 id="u-titulo">Nuevo usuario</h2><button class="sheet-close" onclick="cerrarModal('modal-usuario')">&#x2715;</button></div>
<div class="sheet-body"><input type="hidden" id="u-id">
<div class="sfield"><label>Nombre completo</label><input type="text" id="u-nombre" placeholder="Ej: Mar&#xED;a L&#xF3;pez"></div>
<div class="sfield-row"><div class="sfield"><label>Usuario</label><input type="text" id="u-user" placeholder="marialopez"></div>
<div class="sfield"><label>Contrase&#xF1;a</label><input type="password" id="u-pass" placeholder="&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;&#x2022;"></div></div>
<div class="sfield"><label>Rol</label><select id="u-rol"><option value="empleado">Empleado</option><option value="admin">Administrador</option></select></div></div>
<div class="sheet-foot"><button class="btn btn-ghost" onclick="cerrarModal('modal-usuario')">Cancelar</button><button class="btn btn-dark" onclick="guardarUsuario()">Guardar</button></div></div></div>
<div class="toast" id="toast"></div>
<script>
// VeoYoca con Firebase — variables globales
var DB = {usuarios:[],pedidos:[],bitacora:[]};
var SESSION = null;
var TAB = 'home';
var PEDIDO_EDIT_ID = null;
var SAVING = false;
var _db = null;

// Helpers
function fecha(){return new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});}
function hora(){return new Date().toLocaleTimeString('es-VE',{hour:'2-digit',minute:'2-digit'});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).substr(2,5);}
function cerrarModal(id){document.getElementById(id).classList.remove('open');}
function toast(msg,tipo){var t=document.getElementById('toast');t.textContent=msg;t.className='toast show'+(tipo==='ok'?' t-ok':tipo==='err'?' t-err':tipo==='warn'?' t-warn':'');setTimeout(function(){t.className='toast';},4000);}
function mostrarBadge(tipo){var b=document.getElementById('sync-badge');b.className='sync-badge show'+(tipo==='syncing'?' syncing':tipo==='err'?' err':'');b.textContent=tipo==='syncing'?'Guardando...':tipo==='err'?'Error al guardar':'Guardado';if(tipo!=='syncing')setTimeout(function(){b.className='sync-badge';},2500);}
function diasRestantes(f){if(!f)return null;var p=f.split('/');if(p.length!==3)return null;var d=parseInt(p[0]),m=parseInt(p[1])-1,y=parseInt(p[2]);if(y<100)y+=2000;var dt=new Date(y,m,d);dt.setHours(0,0,0,0);var hoy=new Date();hoy.setHours(0,0,0,0);return isNaN(dt.getTime())?null:Math.round((dt-hoy)/86400000);}
function clasif(p){if(p.estatus==='ENTREGADO')return 'done';var d=diasRestantes(p.fechaLimite);if(d===null)return 'sf';if(d<0)return 'vencido';if(d<=7)return 'urgente';return 'ok';}
function badgeHTML(p){var d=diasRestantes(p.fechaLimite);if(p.estatus==='LISTO')return '<span class="badge b-success">Listo</span>';if(p.estatus==='EN PROCESO')return '<span class="badge b-info">En proceso</span>';if(d===null)return '<span class="badge b-muted">Sin fecha</span>';if(d<0)return '<span class="badge b-danger">Vencido '+Math.abs(d)+'d</span>';if(d<=7)return '<span class="badge b-warning">En '+d+'d</span>';return '<span class="badge b-muted">En '+d+'d</span>';}
function fechaInput(f){if(!f)return '';var p=f.split('/');if(p.length!==3)return '';var y=p[2];if(y.length===2)y='20'+y;return y+'-'+('0'+p[1]).slice(-2)+'-'+('0'+p[0]).slice(-2);}
function inputFecha(f){if(!f)return '';var p=f.split('-');if(p.length!==3)return '';return p[2]+'/'+p[1]+'/'+p[0];}
function registrarBitacora(id,accion){DB.bitacora.push({pedidoId:id,accion:accion,usuario:SESSION.nombre,fecha:fecha(),hora:hora()});if(DB.bitacora.length>500)DB.bitacora=DB.bitacora.slice(-500);}

// Firebase guardar
async function guardarDB(){
  if(SAVING||!_db)return;
  SAVING=true;mostrarBadge('syncing');
  try{
    var {setDoc,doc}=window._firestore;
    await setDoc(doc(_db,'veoyoca','data'),{usuarios:DB.usuarios,pedidos:DB.pedidos,bitacora:DB.bitacora.slice(-500),updatedAt:Date.now()});
    mostrarBadge('ok');
  }catch(e){mostrarBadge('err');toast('Error: '+e.message,'err');}
  SAVING=false;
}

// Auth
function login(){
  var u=document.getElementById('l-user').value.trim().toLowerCase();
  var p=document.getElementById('l-pass').value;
  var usuario=DB.usuarios.find(function(x){return x.username.toLowerCase()===u&&x.password===p;});
  if(!usuario){document.getElementById('l-err').style.display='block';return;}
  SESSION=usuario;localStorage.setItem('veo_session',JSON.stringify({id:usuario.id}));mostrarApp();
}
function logout(){SESSION=null;localStorage.removeItem('veo_session');location.reload();}
function mostrarApp(){
  document.getElementById('splash').style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  document.getElementById('user-avatar').textContent=SESSION.nombre.substring(0,2).toUpperCase();
  document.getElementById('topbar-sub').textContent=SESSION.nombre;
  if(SESSION.rol==='admin')document.getElementById('nb-admin').style.display='flex';
  goTab('home',document.getElementById('nb-home'));
}
function mostrarPerfil(){
  var mis=DB.pedidos.filter(function(p){return p.creadoPor===SESSION.username||p.vendedor===SESSION.nombre;});
  var ent=mis.filter(function(p){return p.estatus==='ENTREGADO';});
  document.getElementById('perfil-body').innerHTML='<div style="text-align:center;padding:8px 0 20px"><div style="width:64px;height:64px;border-radius:50%;background:var(--accent);color:#fff;font-size:22px;font-weight:700;display:flex;align-items:center;justify-content:center;margin:0 auto 12px">'+SESSION.nombre.substring(0,2).toUpperCase()+'</div><div style="font-size:18px;font-weight:700">'+SESSION.nombre+'</div><div style="font-size:13px;color:var(--muted);margin-top:3px">@'+SESSION.username+' - '+SESSION.rol+'</div></div><div class="admin-section"><div class="admin-row"><div>Mis pedidos</div><strong>'+mis.length+'</strong></div><div class="admin-row"><div>Entregados</div><strong>'+ent.length+'</strong></div></div>';
  document.getElementById('modal-perfil').classList.add('open');
}

// Tabs
function goTab(tab,btn){
  TAB=tab;document.querySelectorAll('.nav-btn').forEach(function(b){b.classList.remove('on');});if(btn)btn.classList.add('on');
  var titulos={home:'Pedidos',entregar:'Despacho',nuevo:'Nuevo pedido',reportes:'Reportes',admin:'Administracion',plan:'Rutas',ia:'Plan IA'};
  document.getElementById('topbar-sub').textContent=titulos[tab]||SESSION.nombre;
  var c=document.getElementById('content');
  c.onclick=function(e){
    var ed=e.target.getAttribute('data-edit');
    var en=e.target.getAttribute('data-entregar');
    if(ed)abrirEditar(ed);
    if(en)marcarEntregado(en);
  };

function filtrarHome(){

  lista.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});

// Rutas/Plan
var ZONAS=[{nombre:'Maracaibo',ciudades:['MARACAIBO','NORTE','SUR','CENTRO','AMPARO','COROMOTO','HATICOS','DELICIAS','SANTA LUCIA','SAN FRANCISCO','SIERRA MAESTRA','ZONA INDUSTRIAL','BELLA VISTA']},{nombre:'Sur del lago',ciudades:['EL MOJAN','MARA','SANTA BARBARA','LOS PUERTOS','ALTAGRACIA']},{nombre:'Cabimas / C. Ojeda',ciudades:['CABIMAS','CIUDAD OJEDA','LAGUNILLAS']},{nombre:'Machiques / Perija',ciudades:['MACHIQUES','PERIJA','VILLA DEL ROSARIO','LA VILLA','CARRASQUERO']},{nombre:'Coro / Falcon',ciudades:['CORO','FALCON','TUCACAS','DABAJURO','PUNTO FIJO']},{nombre:'Barquisimeto',ciudades:['BARQUISIMETO','CARORA','YARACUY']},{nombre:'San Cristobal',ciudades:['SAN CRISTOBAL','TACHIRA']},{nombre:'Merida / Los Andes',ciudades:['MERIDA','VALERA','TRUJILLO']},{nombre:'Barinas / Llanos',ciudades:['BARINAS','ACARIGUA','GUASDUALITO','APURE']},{nombre:'Caracas / Centro',ciudades:['CARACAS','PETARE','LOS TEQUES','MIRANDA']},{nombre:'Valencia / Carabobo',ciudades:['VALENCIA','CARABOBO','MARACAY','ARAGUA','TURMERO']},{nombre:'Oriente',ciudades:['MATURIN','EL TIGRE','BARCELONA','CIUDAD BOLIVAR','ANZOATEGUI','PUERTO ORDAZ']},{nombre:'Otros',ciudades:[]}];
function getZona(ciudad){if(!ciudad)return 'Sin ciudad';var cu=ciudad.toUpperCase().trim();for(var i=0;i<ZONAS.length-1;i++)for(var j=0;j<ZONAS[i].ciudades.length;j++)if(cu.indexOf(ZONAS[i].ciudades[j])>=0||ZONAS[i].ciudades[j].indexOf(cu)>=0)return ZONAS[i].nombre;return ciudad;}
function renderPlanificacion(c){
  var pends=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';});
  if(!pends.length){c.innerHTML='<div class="empty"><div class="empty-icon">OK</div>No hay pedidos pendientes</div>';return;}
  var grupos={};pends.forEach(function(p){var z=getZona(p.ciudad);if(!grupos[z])grupos[z]=[];grupos[z].push(p);});
  for(var z in grupos){grupos[z].sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});}
  var zo=Object.keys(grupos).sort(function(a,b){var ma=9999,mb=9999;grupos[a].forEach(function(p){var d=diasRestantes(p.fechaLimite);if(d!==null&&d<ma)ma=d;});grupos[b].forEach(function(p){var d=diasRestantes(p.fechaLimite);if(d!==null&&d<mb)mb=d;});return ma-mb;});
  var tv=pends.filter(function(p){return clasif(p)==='vencido';}).length,tu=pends.filter(function(p){return clasif(p)==='urgente';}).length;
  var html='<div class="stats-bar"><div class="stat"><div class="stat-v">'+pends.length+'</div><div class="stat-l">pedidos</div></div><div class="stat"><div class="stat-v" style="color:#fca5a5">'+tv+'</div><div class="stat-l">vencidos</div></div><div class="stat"><div class="stat-v" style="color:#fcd34d">'+tu+'</div><div class="stat-l">urgentes</div></div><div class="stat"><div class="stat-v">'+zo.length+'</div><div class="stat-l">zonas</div></div></div><div style="padding:10px 14px 0"><div class="sec-label">Plan de entregas</div><button class="btn btn-ghost btn-sm" style="margin-bottom:10px;width:100%" onclick="exportarPlan()">Exportar CSV</button>';
  zo.forEach(function(zona){
    var pedidos=grupos[zona];var urgV=pedidos.filter(function(p){return clasif(p)==='vencido';}).length;var urgU=pedidos.filter(function(p){return clasif(p)==='urgente';}).length;var ch=urgV?'#dc2626':urgU?'#d97706':'#1a1a2e';
    html+='<div class="card" style="margin-bottom:12px"><div style="background:'+ch+';padding:10px 14px"><div style="color:#fff;font-size:13px;font-weight:700">'+zona+' ('+pedidos.length+' pedidos)</div>'+(urgV?'<div style="color:#fca5a5;font-size:11px">'+urgV+' vencido'+(urgV>1?'s':'')+'</div>':urgU?'<div style="color:#fcd34d;font-size:11px">'+urgU+' urgente'+(urgU>1?'s':'')+'</div>':'')+'</div><div style="padding:6px 0">';
    pedidos.forEach(function(p,pi){var d=diasRestantes(p.fechaLimite);var col=!p.fechaLimite?'#6b7280':d<0?'#dc2626':d<=7?'#d97706':'#16a34a';html+='<div style="padding:8px 14px;border-bottom:1px solid #f3f4f6;display:flex;gap:10px;align-items:center"><div style="min-width:22px;height:22px;border-radius:50%;background:'+col+';color:#fff;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0">'+(pi+1)+'</div><div style="flex:1;min-width:0"><div style="font-size:13px;font-weight:600">'+(p.cliente||'Sin nombre')+'</div><div style="font-size:11px;color:#6b7280">#'+(p.numero||p.id.substring(0,6))+(p.vendedor?' - '+p.vendedor:'')+'</div></div>'+badgeHTML(p)+'</div>';});
    html+='</div></div>';
  });
  c.innerHTML=html+'</div>';
}
function exportarPlan(){
  var pends=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';});
  pends.sort(function(a,b){var da=diasRestantes(a.fechaLimite),db=diasRestantes(b.fechaLimite);if(da===null&&db===null)return 0;if(da===null)return 1;if(db===null)return -1;return da-db;});
  var rows=[['#','Pedido','Cliente','Ciudad','Zona','Vendedor','Fecha limite','Dias','Estado','Descripcion']];
  pends.forEach(function(p,i){var d=diasRestantes(p.fechaLimite);rows.push([i+1,p.numero||p.id.substring(0,6),p.cliente||'',p.ciudad||'',getZona(p.ciudad),p.vendedor||'',p.fechaLimite||'',d!==null?d:'',p.estatus||'',(p.descripcion||'').substring(0,80)]);});
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var a=document.createElement('a');a.href='data:text/csv;charset=utf-8,\uFEFF'+encodeURIComponent(csv);a.download='plan_'+fecha().replace(/\//g,'-')+'.csv';a.click();
}

var MODELO='claude-sonnet-4-6';

px">Plan de Entregas con IA</div><div style="color:rgba(255,255,255,.6);font-size:12px;margin-bottom:16px">Claude analiza tus '+pends.length+' pedidos y arma el plan optimo</div><button class="btn btn-green" style="width:100%;padding:13px;font-size:15px;font-weight:700" onclick="generarPlanIA()" id="btn-ia"'+(!apikey?' disabled':'')+'>'+(apikey?'Generar plan inteligente':'Configura tu API Key primero')+'</button></div><div id="ia-resultado"></div></div>';

function guardarAPIKey(){var k=(document.getElementById('ia-keyinput')||{}).value||'';if(!k||!k.startsWith('sk-ant')){toast('Clave invalida','err');return;}localStorage.setItem('veo_apikey',k);toast('Clave guardada','ok');renderPlanIA(document.getElementById('content'));}
function cambiarAPIKey(){localStorage.removeItem('veo_apikey');renderPlanIA(document.getElementById('content'));}
function generarPlanIA(){
  var pends=DB.pedidos.filter(function(p){return p.estatus!=='ENTREGADO';});
  if(!pends.length){toast('No hay pedidos pendientes','warn');return;}
  var API_KEY=localStorage.getItem('veo_apikey')||'';if(!API_KEY){toast('Configura tu API Key primero','err');return;}
  var btn=document.getElementById('btn-ia');if(btn){btn.disabled=true;btn.textContent='Analizando...';}
  var res=document.getElementById('ia-resultado');if(res)res.innerHTML='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:20px;text-align:center"><div style="font-size:14px;font-weight:600;color:#1a1a2e">Claude analizando pedidos...</div></div>';
  var hoy=new Date().toLocaleDateString('es-VE',{day:'2-digit',month:'2-digit',year:'numeric'});
  var lista=pends.map(function(p){var d=diasRestantes(p.fechaLimite);return '- Pedido #'+(p.numero||p.id.substring(0,6))+' | Cliente: '+(p.cliente||'?')+' | Ciudad: '+(p.ciudad||'Sin ciudad')+' | Dias restantes: '+(d!==null?d:'Sin fecha')+' | Estado: '+(p.estatus||'PENDIENTE')+' | Desc: '+(p.descripcion||'').substring(0,60);}).join('\n');
  var prompt='Eres el asistente de logistica de una empresa venezolana de equipos comerciales. Hoy es '+hoy+'.\n\nTengo '+pends.length+' pedidos pendientes:\n\n'+lista+'\n\nGenera:\n1. PLAN DE RUTAS: Agrupa por zona geografica de Venezuela, orden optimo de paradas.\n2. ALERTAS CRITICAS: Pedidos que necesitan atencion inmediata.\n3. CONSOLIDADOS DE CARGA: Que pedidos meter en cada camion.\n4. DIVISION DE COSTOS: Como dividir el flete.\n\nResponde en espanol con emojis para identificar secciones.';
  fetch('https://api.anthropic.com/v1/messages',{method:'POST',headers:{'Content-Type':'application/json','x-api-key':API_KEY,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},body:JSON.stringify({model:MODELO,max_tokens:4000,messages:[{role:'user',content:prompt}]})})
  .then(function(r){return r.json();}).then(function(data){var texto='';if(data.content&&data.content[0]&&data.content[0].text)texto=data.content[0].text;else if(data.error)texto='Error: '+data.error.message;mostrarResultadoIA(texto);if(btn){btn.disabled=false;btn.textContent='Generar nuevo plan';}}).catch(function(err){mostrarResultadoIA('Error: '+err.message);if(btn){btn.disabled=false;btn.textContent='Reintentar';}});
}
function mostrarResultadoIA(texto){
  var res=document.getElementById('ia-resultado');if(!res)return;
  var html=texto.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/^#{1,3} (.+)$/gm,'<div style="font-size:15px;font-weight:700;color:#1a1a2e;margin:16px 0 8px">$1</div>').replace(/^- (.+)$/gm,'<div style="padding:3px 0 3px 12px;border-left:3px solid #e5e7eb;margin:4px 0;font-size:13px">$1</div>').replace(/\n\n/g,'<br><br>').replace(/\n/g,'<br>');
  res.innerHTML='<div style="background:#fff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden"><div style="background:linear-gradient(135deg,#1a1a2e,#2d2d5e);padding:12px 16px;display:flex;justify-content:space-between;align-items:center"><div style="color:#fff;font-size:13px;font-weight:600">Plan generado por Claude</div><button onclick="copiarPlan()" style="background:rgba(255,255,255,.15);color:#fff;border:none;border-radius:6px;padding:4px 10px;font-size:11px;cursor:pointer">Copiar</button></div><div style="padding:16px;font-size:13px;line-height:1.7;color:#374151" id="ia-texto">'+html+'</div><div style="padding:12px 16px;border-top:1px solid #e5e7eb"><button class="btn btn-ghost btn-sm" onclick="generarPlanIA()">Regenerar</button></div></div>';
}
function copiarPlan(){var el=document.getElementById('ia-texto');if(!el)return;navigator.clipboard.writeText(el.innerText||el.textContent).then(function(){toast('Copiado','ok');}).catch(function(){toast('No se pudo copiar','err');});}
